blacklist:
  # Dependencies
  - "node_modules/**"
  - "bower_components/**"
  - "vendor/**"
  - ".venv/**"
  - "venv/**"
  - "env/**"
  
  # Version Control & IDEs
  - ".git/**"
  - ".github/**"
  - ".vscode/**"
  - ".idea/**"
  - "*.suo"
  - "*.ntvs*"
  - "*.njsproj"
  - "*.sln"
  
  # Build Outputs
  - "dist/**"
  - "build/**"
  - "out/**"
  - "target/**"
  - "bin/**"
  - "obj/**"
  
  # Logs & Temp
  - "*.log"
  - "logs/**"
  - "tmp/**"
  - "temp/**"
  - ".cache/**"
  
  # Media & Binaries
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.svg"
  - "*.ico"
  - "*.mp3"
  - "*.mp4"
  - "*.pdf"
  - "*.zip"
  - "*.tar.gz"
  - "*.rar"
  - "*.7z"
  - "*.woff"
  - "*.woff2"
  - "*.ttf"
  - "*.eot"
  
  # Database & Locks
  - "*.db"
  - "*.sqlite"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "poetry.lock"
  
  # Hidden system files
  - ".DS_Store"
  - "Thumbs.db"

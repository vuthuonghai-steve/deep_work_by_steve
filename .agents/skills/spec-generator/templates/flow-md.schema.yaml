$schema: "http://json-schema.org/draft-07/schema#"
title: "Spec Generator flow.md Schema"
description: "Diagram schema for flow.md artifact in Spec Generator v2.0.0"
version: "2.0.0"

type: object

required:
  - spec_version
  - feature
  - diagrams

properties:
  spec_version:
    type: string
    const: "2.0.0"

  feature:
    type: string

  diagrams:
    type: object
    required:
      - sequence
    properties:
      sequence:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
            - diagram
          properties:
            name:
              type: string
            diagram:
              type: string
              description: "Mermaid sequenceDiagram code"
            participants:
              type: array
              items:
                type: string
              description: "List of participant actor names for validation"
            trace:
              type: string

      activity:
        type: array
        items:
          type: object
          required:
            - name
            - diagram
          properties:
            name:
              type: string
            diagram:
              type: string
              description: "Mermaid flowchart or flowchart TD code"
            trace:
              type: string

      state:
        type: array
        items:
          type: object
          required:
            - name
            - entity
            - diagram
          properties:
            name:
              type: string
            entity:
              type: string
              description: "Entity name this state diagram represents"
            diagram:
              type: string
              description: "Mermaid stateDiagram-v2 code"
            states:
              type: array
              items:
                type: string
            transitions:
              type: array
              items:
                type: object
                properties:
                  from:
                    type: string
                  to:
                    type: string
                  trigger:
                    type: string
            trace:
              type: string

      dataflow:
        type: array
        items:
          type: object
          required:
            - name
            - diagram
          properties:
            name:
              type: string
            diagram:
              type: string
              description: "Mermaid flowchart LR code"
            trace:
              type: string

      error_handling:
        type: array
        items:
          type: object
          required:
            - name
            - diagram
          properties:
            name:
              type: string
            diagram:
              type: string
              description: "Mermaid flowchart TD for error flows"
            covers:
              type: array
              items:
                type: string
              description: "Edge case IDs this error flow handles"
            trace:
              type: string

  actor_consistency:
    type: object
    description: "Cross-reference validation result"
    properties:
      validated:
        type: boolean
      actors_in_diagrams:
        type: array
        items:
          type: string
      actors_in_business:
        type: array
        items:
          type: string
      mismatches:
        type: array
        items:
          type: string

  status_consistency:
    type: object
    description: "Cross-reference validation result"
    properties:
      validated:
        type: boolean
      transitions_in_diagrams:
        type: array
        items:
          type: object
            from:
              type: string
            to:
              type: string
            trigger:
              type: string
      transitions_in_business:
        type: array
        items:
          type: object
            from:
              type: string
            to:
              type: string
            trigger:
              type: string
      mismatches:
        type: array
        items:
          type: string

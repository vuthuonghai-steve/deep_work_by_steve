---
# Chain Lens Taxonomy Configuration
# Defines K=8 analytical lenses for Heavy Thinking Manual

chain_lenses:
  - id: 1
    name: Context & State
    focus: Input sufficiency, cached vs fresh knowledge
    priority: critical
    questions:
      - What context is provided vs assumed?
      - Is the context current or stale?
      - What's the gap between available and required?
      - What context would improve understanding?

  - id: 2
    name: Handoff & Contract
    focus: Session/agent/skill boundaries
    priority: critical
    questions:
      - How does information transfer between boundaries?
      - What's the implicit contract between sender and receiver?
      - Where does information degrade or get lost?
      - Are expectations aligned on both sides?

  - id: 3
    name: Error Handling
    focus: Hallucination, silent failures
    priority: critical
    questions:
      - Where might the LLM hallucinate or assume?
      - What failures could happen silently?
      - Is confidence level appropriate for competence?
      - What verification is needed to catch errors?

  - id: 4
    name: Propagation
    focus: Codebase impact, side effects
    priority: high
    questions:
      - What other parts will this change affect?
      - Are there shared dependencies or state mutations?
      - What's the blast radius of this change?
      - Are there implicit contracts being violated?

  - id: 5
    name: Quality Assurance
    focus: Verification, diff, metrics
    priority: high
    questions:
      - How do we verify output correctness?
      - What are the acceptance criteria?
      - What's the diff between current and desired state?
      - How do we measure quality objectively?

  - id: 6
    name: Risk Assessment
    focus: Failure modes, risk mitigation
    priority: high
    questions:
      - What's the worst case scenario?
      - What assumptions could be wrong?
      - What's the cost of being wrong?
      - How do we mitigate identified risks?

  - id: 7
    name: Alternative Paths
    focus: Other valid approaches
    priority: medium
    questions:
      - What are the alternative solutions?
      - What are the trade-offs of each approach?
      - Why is this approach better/worse?
      - What can we learn from rejected alternatives?

  - id: 8
    name: Dependency Analysis
    focus: External dependencies
    priority: medium
    questions:
      - What external services or libraries do we depend on?
      - Are there upstream changes that could break us?
      - What's the reliability track record?
      - Do we have fallback plans?

# Extra chains by task type
extra_chains:
  bugfix:
    - id: 9
      name: Root Cause
      focus: Bug reproduction and root cause analysis
      questions:
        - What is the exact bug behavior?
        - How to reproduce the bug?
        - What is the underlying cause?
        - Is this a symptom of systemic issue?

  feature:
    - id: 9
      name: Impact Analysis
      focus: Feature scope and impact
      questions:
        - What is the feature scope?
        - What systems does it affect?
        - What are the dependencies?
        - What could break?

  ideation:
    - id: 9
      name: Alternative Exploration
      focus: Idea validation and alternatives
      questions:
        - Is this idea worth pursuing?
        - What are the alternatives?
        - What are the trade-offs?
        - What's the ROI?

  spec:
    - id: 9
      name: Dependency Specification
      focus: Complete dependency specification
      questions:
        - What dependencies need specification?
        - Are all edge cases covered?
        - What's the complete API contract?
        - What could change in the future?

# Chain execution settings
execution:
  default_k: 8
  timeout_seconds: 300
  isolation_level: strict
  parallel_execution: true

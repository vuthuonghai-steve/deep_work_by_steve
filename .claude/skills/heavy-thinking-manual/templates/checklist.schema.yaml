$schema: "http://json-schema.org/draft-07/schema#"
title: "Verification Checklist Schema"
description: "Schema for checklist.yaml in Heavy Thinking Manual output"
version: "1.0.0"

type: object

required:
  - checklist_version
  - task_id
  - generated_at
  - verification_checklist

properties:
  checklist_version:
    type: string
    const: "1.0.0"

  task_id:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z]+-[a-z0-9]+$"

  generated_at:
    type: string
    format: date-time

  verification_checklist:
    type: array
    minItems: 1
    items:
      $ref: "#/definitions/checklist_item"

  summary:
    type: object
    properties:
      total_items:
        type: integer
      passed:
        type: integer
      failed:
        type: integer
      pending:
        type: integer
      pass_rate:
        type: number
        minimum: 0
        maximum: 100

definitions:
  checklist_item:
    type: object
    required:
      - id
      - category
      - item
      - status
    properties:
      id:
        type: string
        pattern: "^[A-Z]+-[0-9]+$"
        example: "CONTEXT-1"
      category:
        type: string
        enum:
          - "CONTEXT"
          - "CHAINS"
          - "DELIBERATION"
          - "OUTPUT"
          - "QUALITY"
      item:
        type: string
        description: "Description of checklist item"
      status:
        type: string
        enum:
          - "pass"
          - "fail"
          - "pending"
          - "warning"
      evidence:
        type: string
        description: "Evidence for status"
      severity:
        type: string
        enum:
          - "critical"
          - "high"
          - "medium"
          - "low"
      depends_on:
        type: array
        items:
          type: string
        description: "IDs of items that must pass before this item"
      fix_required:
        type: string
        description: "What must be fixed if fail"
      validator:
        type: string
        description: "How to automatically validate this item"

  # Pre-implementation quality gate items
  pre_implementation_checks:
    type: array
    items:
      type: object
      properties:
        check_id:
          type: string
        check_name:
          type: string
        passed:
          type: boolean
        evidence:
          type: string

  # Context sufficiency checks
  context_checks:
    type: array
    items:
      type: object
      properties:
        source:
          type: string
        loaded:
          type: boolean
        size_bytes:
          type: integer
        quality:
          type: string
          enum: ["high", "medium", "low"]

  # Chain isolation checks
  chain_isolation_checks:
    type: array
    items:
      type: object
      properties:
        chain_id:
          type: integer
        isolated:
          type: boolean
        contamination_detected:
          type: boolean
        evidence:
          type: string

  # Schema validation results
  schema_validations:
    type: array
    items:
      type: object
      properties:
        schema_file:
          type: string
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string

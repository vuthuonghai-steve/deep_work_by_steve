# Format Selection Rules — Configuration

format_selection:

  markdown:
    use_for:
      - overview
      - rationale
      - explanation
      - architecture
      - onboarding
      - glossary
      - domain_explanation
      - walkthrough
      - decision_notes
      - comparison_tables
      - contextual_examples
    avoid_for:
      - hard_rules_without_schema
      - long_mixed_policy_blocks
    template: templates/cleaned-prompt-markdown.template

  yaml:
    use_for:
      - constraints
      - policies
      - checklists
      - routing_rules
      - permission_maps
      - output_contracts
      - acceptance_criteria
      - structured_configuration
    avoid_for:
      - long_prose
      - complex_narrative_context
      - deeply_nested_documents
    template: templates/cleaned-prompt-yaml.template

  json:
    use_for:
      - structured_data
      - api_contracts
      - machine_readable_config
      - data_serialization
    avoid_for:
      - human_readable_prose
      - configuration_with_comments
    template: templates/cleaned-prompt-json.template

# Fallback rule: if format does not match any rule, default to markdown
fallback:
  format: markdown
  template: templates/cleaned-prompt-markdown.template

# Content type detection heuristics
content_detection:

  explanation_keywords:
    - explain
    - describe
    - overview
    - understand
    - rationale
    - why

  constraint_keywords:
    - must
    - must_not
    - constraint
    - rule
    - limit
    - require
    - allow
    - forbid

  structured_data_keywords:
    - json
    - array
    - object
    - list
    - data
    - record
    - schema

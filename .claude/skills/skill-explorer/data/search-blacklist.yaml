# Danh sách đen loại bỏ các file/thư mục rác khi quét codebase

blacklist:
  directories:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "out"
    - "venv"
    - ".venv"
    - "env"
    - "tmp"
    - "info_temp"
    - ".omc"
    - ".omx"
    - "rebuilt"
    - "archive"
  extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".pdf"
    - ".zip"
    - ".tar.gz"
    - ".sqlite"
    - ".exe"
    - ".bin"

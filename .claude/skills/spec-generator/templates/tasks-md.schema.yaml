$schema: "http://json-schema.org/draft-07/schema#"
title: "Spec Generator tasks.md Schema"
description: "Phase schema for tasks.md artifact in Spec Generator v2.0.0"
version: "2.0.0"

type: object

required:
  - spec_version
  - feature
  - complexity
  - phases

properties:
  spec_version:
    type: string
    const: "2.0.0"

  feature:
    type: string

  complexity:
    type: string
    enum:
      - LOW
      - MEDIUM
      - HIGH

  phases:
    type: object
    minProperties: 1
    patternProperties:
      "^phase_[1-4]$":
        type: object
        required:
          - name
          - tasks
        properties:
          name:
            type: string
          complexity_adapter:
            type: string
            enum:
              - LOW
              - MEDIUM
              - HIGH
              - skip
          skip_if:
            type: string
            description: "Condition to skip this phase (e.g., LOW_COMPLEXITY)"
          tasks:
            type: array
            minItems: 1
            items:
              $ref: "#/definitions/task"
    additionalProperties: false

  implementation_notes:
    type: array
    items:
      type: string

  trace_coverage:
    type: number
    minimum: 100
    maximum: 100
    description: "Must be 100%"

definitions:
  task:
    type: object
    required:
      - id
      - title
      - artifact
      - artifact_section
      - trace
      - dependencies
      - estimated_hours
      - acceptance_criteria
    properties:
      id:
        type: string
        pattern: "^T[1-4]-\\d{3}$"
        description: "Task ID in format T{phase}-{###}"
      title:
        type: string
        minLength: 5
        description: "Clear action title"
      description:
        type: string
        description: "Detailed task description"
      artifact:
        type: string
        enum:
          - api.json
          - business.md
          - flow.md
          - tasks.md
        description: "Which spec artifact this task implements"
      artifact_section:
        type: string
        description: "Specific section reference (e.g., 'entities[0].fields')"
      trace:
        type: string
        pattern: "^P[1-4]-T[1-4]-\\d{3}$"
        description: "Full trace ID in format P{phase}-T{phase}-{###}"
      dependencies:
        type: array
        items:
          type: string
        description: "List of prerequisite task IDs"
      estimated_hours:
        type: number
        minimum: 0.5
      acceptance_criteria:
        type: array
        minItems: 2
        items:
          type: string
      backend_only:
        type: boolean
        default: false
      engine:
        type: string
        enum:
          - payloadcms
          - express
          - fastify
          - nestjs
          - TBD
      subtasks:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            completed:
              type: boolean
    additionalProperties: false

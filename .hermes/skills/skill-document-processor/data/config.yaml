# Document Processor Configuration

# Supported input formats
supported_formats:
  pdf:
    extensions: [".pdf"]
    parser: "pdf_parser.py"
    output: "markdown"

  markdown:
    extensions: [".md", ".markdown"]
    parser: "markdown_parser.py"
    output: "markdown"

  text:
    extensions: [".txt", ".text"]
    parser: "text_parser.py"
    output: "markdown"

# PDF tools priority
pdf_tools:
  preferred: "marker-pdf"
  fallback:
    - "pymupdf"
    - "pdftotext"

# File size limits (bytes)
limits:
  max_file_size: 52428800  # 50MB
  max_output_tokens: 50000

# Blacklist patterns for repo scanning
blacklist_patterns:
  - "*.pyc"
  - "__pycache__"
  - ".git"
  - "node_modules"
  - "dist"
  - "build"
  - "*.log"

$schema: "http://json-schema.org/draft-07/schema#"
title: "Spec Generator api.json Schema"
description: "JSON Schema for api.json artifact in Spec Generator v2.0.0"
version: "2.0.0"

type: object

required:
  - spec_version
  - feature
  - engine
  - entities
  - endpoints

properties:
  spec_version:
    type: string
    const: "2.0.0"
    description: "Schema version identifier"

  feature:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: "Feature name in kebab-case"

  engine:
    type: string
    enum:
      - payloadcms
      - express
      - fastify
      - nestjs
      - TBD
    description: "Backend engine"

  description:
    type: string
    description: "Feature description"

  entities:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
        - collection
        - fields
      properties:
        name:
          type: string
          pattern: "^[A-Z][A-Za-z0-9]*$"
          description: "Entity name in PascalCase"
        collection:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: "Collection slug in kebab-case"
        fields:
          type: array
          minItems: 1
          items:
            $ref: "#/definitions/field"
        indexes:
          type: array
          items:
            type: string
        hooks:
          type: object
          properties:
            beforeChange:
              type: array
              items:
                type: string
            afterChange:
              type: array
              items:
                type: string
          additionalProperties: false

  endpoints:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - method
        - path
        - auth
        - access
        - response
        - trace
      properties:
        method:
          type: string
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
        path:
          type: string
          pattern: "^/api/"
        auth:
          type: string
          enum:
            - public
            - authenticated
            - admin
        access:
          type: object
          properties:
            read:
              type: string
            create:
              type: string
            update:
              type: string
            delete:
              type: string
          additionalProperties:
            type: string
        request:
          type: object
          properties:
            body:
              type: object
            query:
              type: object
            params:
              type: object
        response:
          type: object
          required:
            - "200"
            - "400"
            - "401"
            - "403"
          properties:
            "200":
              type: object
            "201":
              type: object
            "400":
              type: object
            "401":
              type: object
            "403":
              type: object
            "404":
              type: object
            "500":
              type: object
        validation:
          type: string
          description: "Reference to Zod schema name"
        trace:
          type: string
          pattern: "^P1-"
          description: "Phase 1 trace ID"
      additionalProperties: false

  auth:
    type: object
    properties:
      provider:
        type: string
        enum:
          - jwt
          - firebase
          - session
          - apikey
      tokens:
        type: object
      refresh:
        type: boolean
    additionalProperties: false

  webhooks:
    type: array
    items:
      type: object
      properties:
        event:
          type: string
        endpoint:
          type: string
        auth:
          type: string

definitions:
  field:
    type: object
    required:
      - name
      - type
    properties:
      name:
        type: string
        pattern: "^[a-z][a-zA-Z0-9]*$"
      type:
        type: string
        enum:
          - text
          - number
          - email
          - textarea
          - richText
          - select
          - radio
          - checkbox
          - date
          - datetime
          - upload
          - relationship
          - array
          - json
          - point
          - code
          - url
          - slug
          - password
      required:
        type: boolean
      label:
        type: string
      options:
        type: object
      max:
        type: number
      min:
        type: number
      maxLength:
        type: number
      hasMany:
        type: boolean
      relationTo:
        type: string
      hooks:
        type: object
    additionalProperties: false

# M0-foundation.yaml — Foundation + Schema
# Spec sections: 2 (Design Principles), 3.1 (Directory Layout), 4 (Artifact Contracts)
# Deliverable: _shared/ với schema files, fixtures, framework.md

milestone:
  id: "M0"
  title: "Foundation + Schema"
  description: "Tạo thư mục _shared/ với schemas và fixtures. Bắt đầu bằng schema + fixtures trước khi sửa skill để tránh validator lệch template. Bao gồm sửa path fix P0."
  spec_ref: "Lines 1265-1277"
  deliverable: "_shared/ với schema files, fixtures, và shared framework path đã fix"
  depends_on: []

tasks:
  - id: "M0.1"
    title: "Tạo framework.md + fix shared framework path"
    type: "create"
    file: "skills/rebuild/_shared/knowledge/framework.md"
    spec_ref: "L1269, L1295, L931-944"
    description: "Copy từ skills/raw/_shared/knowledge/framework.md. Single source of truth cho 7 Zones, Pipeline, Naming conventions. Đảm bảo path từ skill-*/SKILL.md là ../_shared/ (1 level up)."
    acceptance_criteria:
      - "File tồn tại tại _shared/knowledge/framework.md"
      - "Content match với bản hiện có trong skills/raw/"
      - "Path từ SKILL.md: ../_shared/knowledge/framework.md (không phải ../../_shared/)"
      - "Không có hardcode path references"
    status: "pending"

  - id: "M0.2"
    title: "Tạo design.schema.yaml"
    type: "create"
    file: "skills/rebuild/_shared/schemas/design.schema.yaml"
    spec_ref: "L565-692"
    description: "JSON Schema Draft-07 cho design.md frontmatter. Bao gồm: 12 required fields, zone_mapping (7 zones, path validation), progressive_disclosure (tier1-3), required_sections, handoff."
    acceptance_criteria:
      - "Parse được bởi JSON Schema parser"
      - "additionalProperties: false"
      - "zone_mapping.patternProperties chặn path .."
      - "progressive_disclosure.tier1 là array of objects {path, base}"
      - "Handoff ready_condition được schema hóa"
    status: "pending"

  - id: "M0.3"
    title: "Tạo todo.schema.yaml"
    type: "create"
    file: "skills/rebuild/_shared/schemas/todo.schema.yaml"
    spec_ref: "L696-831"
    description: "JSON Schema cho todo.md frontmatter. Bao gồm: phases array, tasks array với depends_on, blockers, prerequisites, handoff ready_condition."
    acceptance_criteria:
      - "Parse được bởi JSON Schema parser"
      - "Task items có depends_on cross-reference validation"
      - "Status enum: pending | in_progress | done | blocked | skipped"
      - "Priority enum: critical | high | medium | low"
    status: "pending"

  - id: "M0.4"
    title: "Tạo build-log.schema.yaml"
    type: "create"
    file: "skills/rebuild/_shared/schemas/build-log.schema.yaml"
    spec_ref: "L835-910"
    description: "JSON Schema cho build-log.md frontmatter. Bao gồm: execution_trace array, feedback_to_planner/architect arrays, quality_metrics object."
    acceptance_criteria:
      - "Parse được bởi JSON Schema parser"
      - "execution_trace items có action enum (CREATE_FILE, MODIFY_FILE, VALIDATE, RUN_SCRIPT)"
      - "decision enum (CONTINUE, STOP_AND_REPORT, RETRY)"
      - "quality_metrics có placeholder_ratio, critical_tasks_done, validator_pass"
    status: "pending"

  - id: "M0.5"
    title: "Tạo design fixtures (good/bad)"
    type: "create"
    file: "skills/rebuild/_shared/fixtures/good/design.md, skills/rebuild/_shared/fixtures/bad/design.md"
    spec_ref: "L261-358"
    description: "Good: design.md hợp lệ, pass schema. Bad: thiếu required fields hoặc zone_mapping sai."
    acceptance_criteria:
      - "Good fixture pass schema_validator với design.schema.yaml"
      - "Bad fixture fail schema_validator với error message rõ ràng"
      - "Good fixture có đủ 7 zones trong zone_mapping"
      - "Good fixture có progressive_disclosure tier1-3"
    status: "pending"

  - id: "M0.6"
    title: "Tạo todo fixtures (good/bad)"
    type: "create"
    file: "skills/rebuild/_shared/fixtures/good/todo.md, skills/rebuild/_shared/fixtures/bad/todo.md"
    spec_ref: "L383-452"
    description: "Good: todo.md hợp lệ với phases, tasks, handoff. Bad: task dependency circular hoặc thiếu required fields."
    acceptance_criteria:
      - "Good fixture pass schema_validator với todo.schema.yaml"
      - "Bad fixture fail với error message cụ thể"
      - "Good fixture có status: ready_for_builder"
      - "Build tasks (PH1+) có thể status: pending"
    status: "pending"

  - id: "M0.7"
    title: "Tạo build-log fixtures (good/bad)"
    type: "create"
    file: "skills/rebuild/_shared/fixtures/good/build-log.md, skills/rebuild/_shared/fixtures/bad/build-log.md"
    spec_ref: "L490-557"
    description: "Good: build-log hợp lệ, complete. Bad: có STOP_AND_REPORT nhưng validator_pass = true (mâu thuẫn)."
    acceptance_criteria:
      - "Good fixture pass schema_validator với build-log.schema.yaml"
      - "Bad fixture fail với mâu thuẫn logic rõ ràng"
      - "Good fixture có execution_trace items hợp lệ"
    status: "pending"

verify:
  method: "Chạy schema validator trên tất cả fixtures"
  commands:
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/design.schema.yaml _shared/fixtures/good/design.md  # expect: PASS"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/design.schema.yaml _shared/fixtures/bad/design.md   # expect: FAIL"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/todo.schema.yaml _shared/fixtures/good/todo.md     # expect: PASS"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/todo.schema.yaml _shared/fixtures/bad/todo.md      # expect: FAIL"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/build-log.schema.yaml _shared/fixtures/good/build-log.md  # expect: PASS"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/build-log.schema.yaml _shared/fixtures/bad/build-log.md   # expect: FAIL"
  note: "Schema files cần parse được, fixtures good/bad cần hợp lý. Validator scripts tạo ở M1."

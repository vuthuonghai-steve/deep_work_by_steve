# M1-validators.yaml — Validators
# Spec sections: 6 (Handoff Validators), 9.3 (Typo Protection)
# Deliverable: _shared/validators/ với 3 Python scripts

milestone:
  id: "M1"
  title: "Validators"
  description: "Tạo 3 validator scripts: schema_validator (YAML compliance), trace_validator (trace tags), handoff_validator (stage readiness). Chạy trên fixtures để verify."
  spec_ref: "Lines 1279-1289"
  deliverable: "_shared/validators/ với 3 Python scripts"
  depends_on: ["M0"]

tasks:
  - id: "M1.1"
    title: "Tạo schema_validator.py"
    type: "create"
    file: "skills/rebuild/_shared/validators/schema_validator.py"
    spec_ref: "L1283, L983-998, L1057-1079"
    description: "Validate YAML frontmatter against JSON Schema. Đọc file .md, parse YAML frontmatter (giữa ---), validate với schema tương ứng (design/todo/build-log)."
    acceptance_criteria:
      - "CLI: schema_validator.py --schema <path> <file.md>"
      - "Parse YAML frontmatter từ Markdown file"
      - "Validate against JSON Schema Draft-07"
      - "Output format: validation_result YAML với stage, artifact, timestamp, passed, checks list"
      - "Mỗi check có name, status (pass/fail), error, severity, fix_hint"
      - "Chạy được trên all 6 fixtures (3 good → PASS, 3 bad → FAIL)"
    status: "pending"

  - id: "M1.2"
    title: "Tạo trace_validator.py"
    type: "create"
    file: "skills/rebuild/_shared/validators/trace_validator.py"
    spec_ref: "L91-95, L1017-1018, L1036-1038, L1248-1256"
    description: "Validate trace tags against patterns. 4 patterns từ spec: design (regex [TỪ DESIGN §n.n]), suggestion ([GỢI Ý BỔ SUNG]), clarification ([CẦN LÀM RÕ]), resource_audit ([TỪ AUDIT TÀI NGUYÊN]). Catch typo variants."
    acceptance_criteria:
      - "CLI: trace_validator.py <file.md>"
      - "Chấp nhận 4 trace tag patterns: [TỪ DESIGN §n], [GỢI Ý BỔ SUNG], [CẦN LÀM RÕ], [TỪ AUDIT TÀI NGUYÊN]"
      - "Design pattern: regex ^\\[TỪ DESIGN §[0-9]+(\\.[0-9]+)?\\]$"
      - "Catch typo: [CẦU LÀM RÕ] → FAIL"
      - "Catch typo: [TỪ AUDIT TÀI NGUYÊN] (thiếu N) → FAIL"
      - "Check: không có unparseable trace tags"
      - "Check: không có [CẦN LÀM RÕ] blockers unresolved"
      - "Output: PASS hoặc FAIL với invalid tags list"
    status: "pending"

  - id: "M1.3"
    title: "Tạo handoff_validator.py"
    type: "create"
    file: "skills/rebuild/_shared/validators/handoff_validator.py"
    spec_ref: "L981-1065, L1285"
    description: "Validate handoff readiness per stage. 3 stages: design-to-planner, planner-to-builder, builder-complete. Kiểm tra ready_condition từ schema."
    acceptance_criteria:
      - "CLI: handoff_validator.py --stage <stage> <file.md>"
      - "Stage design-to-planner:"
      - "  - schema: YAML parse, version 3.0.0, artifact_type=design, stage=architect, status=ready_for_planner"
      - "  - content: all 7 zones present, valid paths (no absolute, no ..), tier1 present with base field"
      - "  - content: all 10 required section headings present in Markdown body (heading match)"
      - "  - content: handoff.next_stage == planner"
      - "  - trace: no unparseable trace tags"
      - "Stage planner-to-builder:"
      - "  - schema: YAML parse, artifact_type=todo, stage=planner, status=ready_for_builder"
      - "  - content: all task IDs unique, all depends_on IDs exist"
      - "  - content: every file in design.md zone_mapping has at least one task"
      - "  - content: no blockers with resolved: false, all PH0 tasks done/skipped"
      - "  - content: all prerequisites status: ready, priority in enum"
      - "  - trace: all trace values match 4 defined patterns, no unresolved [CẦN LÀM RÕ]"
      - "Stage builder-complete:"
      - "  - schema: YAML parse, artifact_type=build-log"
      - "  - content: all critical tasks success/skipped, placeholder_ratio < 0.10, validator_pass == true"
      - "  - content: no execution_trace with decision: STOP_AND_REPORT"
      - "  - output: output directory exists, SKILL.md exists, all zone_mapping files created"
      - "  - output: validate_skill.py passes"
      - "Output format: validation_result YAML với stage, artifact, passed, checks list"
    status: "pending"

  - id: "M1.4"
    title: "Verify validators trên good fixtures"
    type: "validate"
    file: "skills/rebuild/_shared/validators/"
    spec_ref: "L1286-1287"
    description: "Chạy cả 3 validator trên good fixtures. Tất cả phải PASS."
    acceptance_criteria:
      - "schema_validator trên 3 good fixtures → PASS"
      - "trace_validator trên 3 good fixtures → PASS"
      - "handoff_validator --stage design-to-planner good/design.md → PASS"
      - "handoff_validator --stage planner-to-builder good/todo.md → PASS"
      - "handoff_validator --stage builder-complete good/build-log.md → PASS"
    status: "pending"

  - id: "M1.5"
    title: "Verify validators trên bad fixtures"
    type: "validate"
    file: "skills/rebuild/_shared/validators/"
    spec_ref: "L1286-1287"
    description: "Chạy cả 3 validator trên bad fixtures. Tất cả phải FAIL với error messages đúng."
    acceptance_criteria:
      - "schema_validator trên 3 bad fixtures → FAIL"
      - "Error messages chỉ ra đúng lỗi"
      - "Không có false positive trên good fixtures"
    status: "pending"

verify:
  method: "Chạy tất cả validators trên fixtures"
  commands:
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/design.schema.yaml _shared/fixtures/good/design.md"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/design.schema.yaml _shared/fixtures/bad/design.md"
    - "python _shared/validators/trace_validator.py _shared/fixtures/good/todo.md"
    - "python _shared/validators/trace_validator.py _shared/fixtures/bad/todo.md"
    - "python _shared/validators/handoff_validator.py --stage design-to-planner _shared/fixtures/good/design.md"
    - "python _shared/validators/handoff_validator.py --stage planner-to-builder _shared/fixtures/good/todo.md"
    - "python _shared/validators/handoff_validator.py --stage builder-complete _shared/fixtures/good/build-log.md"

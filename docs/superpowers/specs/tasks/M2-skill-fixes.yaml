# M2-skill-fixes.yaml — Fix P0/P1 trong 3 SKILL.md
# Spec sections: 3.2 (Data Flow), 5 (Path Resolution), 7 (Progressive Disclosure)
# Deliverable: 3 SKILL.md portable, không hardcode

milestone:
  id: "M2"
  title: "Fix P0/P1 trong 3 SKILL.md"
  description: "Sửa 3 SKILL.md trong skills/rebuild/ để portable, không hardcode. Bao gồm: path fix, progressive disclosure, trace tags, boot sequence."
  spec_ref: "Lines 1291-1304"
  deliverable: "3 SKILL.md portable, không hardcode"
  depends_on: ["M0"]

tasks:
  - id: "M2.1"
    title: "Verify shared framework path đã fix từ M0"
    type: "validate"
    file: "skills/rebuild/skill-*/SKILL.md"
    spec_ref: "L1295, L931-944"
    description: "Verify path fix đã thực hiện ở M0.1. Grep xác nhận không còn ../../_shared/ trong 3 SKILL.md. Thêm path references cho knowledge/*.md và scripts/*.py nếu cần."
    acceptance_criteria:
      - "grep '../../_shared/' skill-*/SKILL.md → no results (đã fix ở M0)"
      - "Path từ knowledge/*.md: ../../_shared/knowledge/framework.md (2 levels up — đúng)"
      - "Path từ scripts/*.py: Path(__file__).parents[2] / '_shared' / 'knowledge' / 'framework.md'"
      - "Không có hardcoded absolute paths"
    status: "pending"

  - id: "M2.2"
    title: "Gỡ hardcode @.claude/skills/ khỏi Progressive Disclosure"
    type: "modify"
    file: "skills/rebuild/skill-*/SKILL.md"
    spec_ref: "L1296, L964-977"
    description: "Xóa hardcode paths kiểu @.claude/skills/skill-architect/... Thay bằng relative paths hoặc skill_dir references."
    acceptance_criteria:
      - "Không còn @.claude/skills/ trong runtime instructions"
      - "Progressive disclosure dùng relative paths"
      - "SKILL_OUTPUT_ROOT env var documented"
    status: "pending"

  - id: "M2.3"
    title: "Sửa typo [CẦU LÀM RÕ] → [CẦN LÀM RÕ]"
    type: "modify"
    file: "skills/rebuild/skill-builder/SKILL.md"
    spec_ref: "L1298, L1249"
    description: "Fix typo trong skill-builder: [CẦU LÀM RÕ] → [CẦN LÀM RÕ]. Đây là bug hiện tại khiến Builder scan sai pattern."
    acceptance_criteria:
      - "Không còn [CẦU LÀM RÕ] trong bất kỳ file nào"
      - "[CẦN LÀM RÕ] xuất hiện đúng chỗ"
    status: "pending"

  - id: "M2.4"
    title: "Chuẩn hóa trace tags: 4 patterns duy nhất"
    type: "modify"
    file: "skills/rebuild/skill-*/SKILL.md"
    spec_ref: "L91-95, L1299, L1248-1256"
    description: "Chuẩn hóa trace tags thành 4 patterns từ spec: [TỪ DESIGN §n.n] (regex), [GỢI Ý BỔ SUNG], [CẦN LÀM RÕ], [TỪ AUDIT TÀI NGUYÊN]. Loại bỏ mọi biến thể khác."
    acceptance_criteria:
      - "Chỉ có 4 trace tag patterns trong tất cả 3 SKILL.md: design, suggestion, clarification, resource_audit"
      - "Design pattern dùng regex: ^\\[TỪ DESIGN §[0-9]+(\\.[0-9]+)?\\]$"
      - "Không có variant sai: [CẦU LÀM RÕ], [TỪ AUDIT TÀI NGUYÊN] (thiếu N)"
      - "Không dùng [DONE], [TODO], [BLOCKED] — đây không phải spec taxonomy"
    status: "pending"

  - id: "M2.5"
    title: "Sửa boot sequence: chỉ load Tier 1"
    type: "modify"
    file: "skills/rebuild/skill-*/SKILL.md"
    spec_ref: "L1300"
    description: "Boot sequence chỉ load Tier 1 files. Bỏ directive 'quét tất cả files upfront'. Tier 2/3 load per-phase."
    acceptance_criteria:
      - "Boot instruction chỉ reference Tier 1 files (SKILL.md)"
      - "Không có directive quét tất cả files khi boot"
      - "Tier 2 load instructions nằm trong phase tương ứng"
    status: "pending"

  - id: "M2.6"
    title: "Thêm progressive_disclosure metadata vào SKILL.md frontmatter"
    type: "modify"
    file: "skills/rebuild/skill-*/SKILL.md"
    spec_ref: "L1301, L316-331"
    description: "Thêm YAML frontmatter progressive_disclosure vào 3 SKILL.md. Tier 1: SKILL.md, Tier 2: knowledge/*.md, Tier 3: assets."
    acceptance_criteria:
      - "Mỗi SKILL.md có progressive_disclosure trong frontmatter"
      - "tier1: [{path: 'SKILL.md', base: 'skill_dir'}]"
      - "tier2/3: đúng với spec design"
    status: "pending"

  - id: "M2.7"
    title: "Tách shared contract khỏi knowledge/architect.md"
    type: "modify"
    file: "skills/rebuild/skill-*/knowledge/architect.md"
    spec_ref: "L1302"
    description: "Tách nội dung shared framework khỏi 3 knowledge/architect.md. Chỉ giữ workflow riêng cho mỗi skill. Shared content đã ở _shared/knowledge/framework.md."
    acceptance_criteria:
      - "knowledge/architect.md trong mỗi skill chỉ chứa workflow riêng"
      - "Không lặp lại 7 Zones, Pipeline, Naming (đã ở framework.md)"
      - "Reference framework.md thay vì lặp content"
    status: "pending"

  - id: "M2.8"
    title: "Verify portability: copy sang temp dir"
    type: "validate"
    file: "skills/rebuild/"
    spec_ref: "L1304"
    description: "Copy toàn bộ skills/rebuild/ sang thư mục tạm. Verify tất cả paths resolve đúng."
    acceptance_criteria:
      - "Copy sang /tmp/test-rebuild/"
      - "Không có broken path references"
      - "Không có hardcode absolute paths"
      - "framework.md accessible từ cả 3 skills"
    status: "pending"

verify:
  method: "Grep + copy test"
  commands:
    - "grep -r '../../_shared/' skills/rebuild/skill-*/SKILL.md  # expect: no results"
    - "grep -r '@.claude/skills/' skills/rebuild/skill-*/SKILL.md  # expect: no results"
    - "grep -r 'CẦU LÀM RÕ' skills/rebuild/  # expect: no results"
    - "cp -r skills/rebuild/ /tmp/test-rebuild/ && ls /tmp/test-rebuild/_shared/knowledge/framework.md"

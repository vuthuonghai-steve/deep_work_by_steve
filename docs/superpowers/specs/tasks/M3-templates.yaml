    - "python _shared/validators/schema_validator.py --schema _shared/schemas/todo.schema.yaml .skill-context/test-skill/todo.md"
    - "python _shared/validators/schema_validator.py --schema _shared/schemas/build-log.schema.yaml .skill-context/test-skill/build-log.md"

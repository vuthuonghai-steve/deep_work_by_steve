# Single source of truth: 30 canonical Claude Code hook events.
# Source: domain-handbook.md §2 + hooks-reference.md §1 (canonical event table).
# [TỪ DESIGN §2.1, §3 data/canonical-events.yaml] [TỪ HANDBOOK §2 G1]
#
# Fields per event:
#   name:            event identifier (exact, as fired by Claude Code)
#   phase:           lifecycle phase
#   matcher_support: true if event accepts a matcher string (exact/OR/regex)
#   blocking_capable:true if a hook on this event can BLOCK (deny) the action
#
# NOTE (discrepancy): design.md / quality-matrix.yaml state "20/30 matcher-supporting".
# The canonical table (hooks-reference.md §1) yields 19 supporting / 11 not.
# Grounded here to the table = source of truth. Flagged in build-log (R-extra).

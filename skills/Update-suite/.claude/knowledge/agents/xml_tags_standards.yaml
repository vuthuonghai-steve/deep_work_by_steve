version: "1.0.0"
updated_at: "2026-05-28"
standard_name: "XML Tag Standardization for LLM Activation"
description: "Unifies the usage of XML-like semantic tags across the codebase, documentation, and prompt engineering flows in deep_work_by_steve."

tag_definitions:
  - tag: "instructions"
    purpose: "Holds absolute behavior-governing rules, constraints, and non-negotiables for the agent. This is the L0 anchor."
    preferred_format: "YAML blocks containing 'must', 'must_not', and 'constraints' inside."
    nesting_policy: "Can reside in root prompts or L0 files. Should not contain deeply nested tags."
    example: |
      <instructions>
      must:
        - preserve public APIs
        - run validation scripts before editing
      must_not:
        - delete folders without backup
      </instructions>

  - tag: "context"
    purpose: "Provides passive background reference information, glossary, domain context, database schema, or environment details. Strictly read-only; contains no executable commands."
    preferred_format: "Markdown (for readability) or structured YAML."
    nesting_policy: "May contain standard markdown headings, tables, or lists."
    example: |
      <context>
      ### Architecture Overview
      This module is designed using Clean Architecture. The domain entities are fully decoupled from the framework.
      </context>

  - tag: "task"
    purpose: "Defines the specific user objective, requested changes, or instructions for a single agent/subagent execution."
    preferred_format: "Concise Markdown text stating the objective and scope."
    nesting_policy: "Usually placed at the top of a task invocation."
    example: |
      <task>
      Refactor payment retry flow in `payment_service.py` to prevent duplicate charges under race conditions.
      </task>

  - tag: "constraints"
    purpose: "Specifies hard boundary limits, safety rules, style guides, or technical restrictions for the current task."
    preferred_format: "YAML block listing clear checklist rules."
    nesting_policy: "Often used in conjunction with <task>."
    example: |
      <constraints>
      must:
        - write tests covering 100% of failure states
      must_not:
        - alter database schema
      </constraints>

  - tag: "acceptance_criteria"
    purpose: "Specifies the definition of done and the test scenarios that must pass for the task to be accepted."
    preferred_format: "YAML block containing checklists and validation procedures."
    nesting_policy: "Placed near the end of a task spec."
    example: |
      <acceptance_criteria>
      criteria:
        - existing integration tests pass
        - performance metrics show zero regressions
      </acceptance_criteria>

  - tag: "examples"
    purpose: "Provides high-fidelity code patterns, input/response pairs, or good/bad examples for the agent to retrieve and mimic."
    preferred_format: "Markdown code blocks highlighting correct and incorrect implementations."
    nesting_policy: "Can be nested with standard markdown or isolated code blocks."
    example: |
      <examples>
      ### Good Pattern (Idempotency Key)
      ```python
      def process_payment(idempotency_key):
          # Correct implementation
      ```
      </examples>

  - tag: "input"
    purpose: "Wraps raw user inputs, dirty/unstructured text, or external resources being fed into the pipeline."
    preferred_format: "Raw text or the native format of the input."
    nesting_policy: "Acts as a protective boundary to isolate raw input from prompt instructions (prevention of prompt injection)."
    example: |
      <input>
      Raw user file contents or logs here...
      </input>

  - tag: "retrieved_docs"
    purpose: "Wraps context returned from vector databases, semantic searches, or file explorers."
    preferred_format: "Structured Markdown segments with file path citations."
    nesting_policy: "Used primarily by exploration agents."
    example: |
      <retrieved_docs>
      - File: [payment.py](file:///path/to/payment.py)
        Content: ...
      </retrieved_docs>

  - tag: "output_contract"
    purpose: "Defines the exact response format, fields, or schema expected from the agent."
    preferred_format: "YAML block indicating required sections or JSON schema."
    nesting_policy: "Placed at the very end of the prompt to prime the final token generation."
    example: |
      <output_contract>
      include:
        - summary_of_changes
        - files_changed
        - validation_performed
      </output_contract>

unification_policies:
  naming_convention: "Always use lowercase letters with underscores for tag names (e.g., <acceptance_criteria> not <Acceptance-Criteria>)."
  spacing: "Place tags on their own line with standard block indentation. Do not put text immediately next to tags (e.g. <tag>text</tag> is discouraged for large blocks, use multiline instead)."
  injection_prevention: "When wrapping untrusted data in <input>, scrub the content of closing XML tags or escape them to prevent escaping the semantic sandbox."

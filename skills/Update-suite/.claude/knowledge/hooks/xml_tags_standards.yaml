version: "1.0.0"
updated_at: "2026-05-28"
standard_name: "Chuẩn hóa Thẻ XML cho Tài liệu Hooks"
description: "Thống nhất cách sử dụng các thẻ ngữ nghĩa dạng XML trong tài liệu và cấu trúc cấu hình liên quan đến Hook của Claude Code."

tag_definitions:
  - tag: "instructions"
    purpose: "Chứa các quy tắc bắt buộc, ràng buộc hành vi và luật cứng (L0 anchor) cho việc cấu hình/sử dụng hook."
    preferred_format: "Khối YAML chứa 'must', 'must_not' và 'constraints'."
    nesting_policy: "Đặt trong root prompt hoặc tệp L0. Không lồng quá sâu."
    example: |
      <instructions>
      must:
        - Luôn kiểm tra tính hợp lệ của schema input của hook trước khi viết script
        - Sử dụng biến môi trường CLAUDE_PROJECT_DIR để trỏ đường dẫn tuyệt đối
      must_not:
        - Sử dụng giá trị cứng (hardcoded paths) cho thư mục home hoặc project
      </instructions>

  - tag: "context"
    purpose: "Cung cấp thông tin nền tĩnh, giải thích lý thuyết, cơ chế hoạt động của hook hoặc sơ đồ vòng đời sự kiện."
    preferred_format: "Markdown (cho khả năng đọc hiểu tự nhiên) hoặc YAML có cấu trúc."
    nesting_policy: "Có thể chứa tiêu đề, bảng hoặc danh sách Markdown tiêu chuẩn."
    example: |
      <context>
      ### Vòng đời sự kiện Hook
      Các hook chạy theo 3 nhịp độ: một lần mỗi session, một lần mỗi lượt tương tác (turn) và trên mỗi tool call.
      </context>

  - tag: "hook_schema"
    purpose: "Định nghĩa cấu trúc dữ liệu JSON đầu vào (input payload) hoặc đầu ra (output decision) cho từng sự kiện hook cụ thể."
    preferred_format: "JSON Schema hoặc khối JSON/YAML mô tả chi tiết các trường."
    nesting_policy: "Đặt bên trong phần tài liệu đặc tả của sự kiện."
    example: |
      <hook_schema>
      {
        "session_id": "chuỗi định danh session",
        "cwd": "thư mục làm việc hiện tại",
        "hook_event_name": "tên sự kiện"
      }
      </hook_schema>

  - tag: "examples"
    purpose: "Cung cấp các mẫu mã nguồn thực tế (Bash, Python, JSON) cho cấu hình hoặc các file script xử lý hook mẫu đúng/sai."
    preferred_format: "Các khối mã nguồn Markdown có cú pháp highlight và giải thích ngữ cảnh."
    nesting_policy: "Được bọc riêng để agent dễ dàng học theo."
    example: |
      <examples>
      ### Mẫu chặn lệnh nguy hiểm (Bash)
      ```bash
      #!/bin/bash
      # Đọc JSON từ stdin và phân tích...
      ```
      </examples>

unification_policies:
  naming_convention: "Luôn viết thường toàn bộ và dùng dấu gạch dưới (ví dụ: <hook_schema> thay vì <Hook-Schema>)."
  spacing: "Đặt thẻ XML trên một dòng riêng biệt với lề thụt đầu dòng tiêu chuẩn. Tránh viết văn bản ngay sát thẻ."
  injection_prevention: "Khi nhúng dữ liệu chưa qua kiểm chứng vào thẻ <input>, hãy làm sạch hoặc escape các thẻ XML đóng để tránh lỗi thoát khỏi phân vùng ngữ nghĩa."

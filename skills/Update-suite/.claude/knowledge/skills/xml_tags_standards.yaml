version: "1.0.0"
updated_at: "2026-05-28"
standard_name: "Chuẩn hóa Thẻ XML cho Tài liệu Skills"
description: "Thống nhất cách sử dụng các thẻ ngữ nghĩa dạng XML trong tài liệu và cấu trúc cấu hình liên quan đến Skill của Claude Code."

tag_definitions:
  - tag: "instructions"
    purpose: "Chứa các quy tắc bắt buộc, ràng buộc hành vi và luật cứng (L0 anchor) cho việc cấu hình, kích hoạt và viết hướng dẫn cho Skill."
    preferred_format: "Khối YAML chứa 'must', 'must_not' và 'constraints'."
    nesting_policy: "Đặt trong root prompt hoặc tệp L0. Không lồng quá sâu."
    example: |
      <instructions>
      must:
        - Luôn khai báo frontmatter đầy đủ với khóa 'description' cụ thể để tối ưu kích hoạt tự động.
        - Giữ cho phần thân SKILL.md dưới 500 dòng để tiết kiệm token budget.
      must_not:
        - Đưa domain context hoặc ví dụ cồng kềnh trực tiếp vào SKILL.md; hãy tách chúng ra các tệp hỗ trợ riêng.
      </instructions>

  - tag: "context"
    purpose: "Cung cấp thông tin nền tĩnh, giải thích lý thuyết, cơ chế hoạt động của skill, cách nạp context hoặc các mức độ kích hoạt."
    preferred_format: "Markdown (cho khả năng đọc hiểu tự nhiên) hoặc YAML có cấu trúc."
    nesting_policy: "Có thể chứa tiêu đề, bảng hoặc danh sách Markdown tiêu chuẩn."
    example: |
      <context>
      ### Vòng đời của Skill Content
      Khi bạn hoặc Claude kích hoạt một skill, nội dung đã dựng của `SKILL.md` sẽ đi vào cuộc hội thoại dưới dạng một tin nhắn duy nhất và duy trì ở đó cho đến hết session.
      </context>

  - tag: "skill_schema"
    purpose: "Định nghĩa cấu trúc YAML frontmatter hoặc cấu trúc thư mục của một skill package."
    preferred_format: "JSON Schema hoặc khối YAML mô tả chi tiết các trường."
    nesting_policy: "Đặt bên trong phần tài liệu đặc tả của skill."
    example: |
      <skill_schema>
      ---
      name: tên-skill
      description: mô tả chi tiết nhiệm vụ và khi nào dùng
      disable-model-invocation: true
      allowed-tools: Bash(git *)
      ---
      </skill_schema>

  - tag: "examples"
    purpose: "Cung cấp các mẫu mã nguồn thực tế (Bash, Python, Markdown) về cách khai báo và triển khai skill hoặc các file script bổ trợ mẫu đúng/sai."
    preferred_format: "Các khối mã nguồn Markdown có cú pháp highlight và giải thích ngữ cảnh."
    nesting_policy: "Được bọc riêng để agent dễ dàng học theo."
    example: |
      <examples>
      ### Tệp SKILL.md mẫu cho một skill dọn dẹp bộ nhớ
      ```markdown
      ---
      description: Dọn dẹp bộ nhớ và dọn dẹp các tệp tạm thời trong thư mục build.
      disable-model-invocation: true
      ---
      
      ## Dọn dẹp dự án
      Chạy lệnh dọn dẹp dự án sau:
      !`npm run clean`
      ```
      </examples>

unification_policies:
  naming_convention: "Luôn viết thường toàn bộ và dùng dấu gạch dưới (ví dụ: <skill_schema> thay vì <Skill-Schema>)."
  spacing: "Đặt thẻ XML trên một dòng riêng biệt với lề thụt đầu dòng tiêu chuẩn. Tránh viết văn bản ngay sát thẻ."
  injection_prevention: "Khi nhúng dữ liệu chưa qua kiểm chứng vào thẻ <input>, hãy làm sạch hoặc escape các thẻ XML đóng để tránh lỗi thoát khỏi phân vùng ngữ nghĩa."

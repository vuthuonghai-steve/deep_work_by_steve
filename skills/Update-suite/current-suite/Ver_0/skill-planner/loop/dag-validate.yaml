# DAG Validation Checklist — Machine-Readable Quality Gates
# Đọc bởi AI agent để validate dag_plan.json một cách tự động

version: "1.0.0"
artifact_type: "dag-plan-quality-checklist"

quality_gates:
  structure:
    required_fields:
      - "skill_schema_version"
      - "artifact_type"
      - "skill_name"
      - "generated_by"
      - "generated_at"
      - "stage"
      - "status"
      - "phases"
      - "task_dependencies"
      - "pre_requisites"
      - "blockers"
      - "handoff"
    checks:
      - id: "S1"
        description: "dag_plan.json có đủ required fields"
        field: "root"
        rule: "has_required_fields"
      - id: "S2"
        description: "phases là array và không empty"
        field: "phases"
        rule: "is_non_empty_array"
      - id: "S3"
        description: "task_dependencies là object (adjacency list)"
        field: "task_dependencies"
        rule: "is_object"

  schema_compliance:
    yaml_frontmatter:
      - skill_schema_version: "3.0.0"
      - artifact_type: "dag_plan"
      - skill_name: "{matches_blueprint}"
      - generated_by: "skill-planner"
      - generated_at: "{iso8601}"
      - stage: "planner"
      - status: "in_progress|ready_for_builder|blocked"
    checks:
      - id: "Y1"
        description: "skill_schema_version = 3.0.0"
        field: "skill_schema_version"
        rule: "equals_3.0.0"
      - id: "Y2"
        description: "artifact_type = dag_plan"
        field: "artifact_type"
        rule: "equals_dag_plan"
      - id: "Y3"
        description: "status is valid enum value"
        field: "status"
        rule: "valid_status"

  phases_structure:
    phase_pattern: "^PH[0-9]+$"
    checks:
      - id: "P1"
        description: "PH0 tồn tại (Resource Preparation)"
        rule: "has_phase_0"
      - id: "P2"
        description: "Tất cả phase có phase_id đúng format"
        rule: "phase_ids_match_pattern"
      - id: "P3"
        description: "Mỗi phase có phase_name và tasks array"
        rule: "phases_have_name_and_tasks"
      - id: "P4"
        description: "Phase IDs form logical order (PH0 -> PH1 -> PH2...)"
        rule: "phase_order_logical"

  tasks_structure:
    task_pattern: "^T[0-9]+\\.[0-9]+$"
    checks:
      - id: "T1"
        description: "Mỗi task có task_id đúng format"
        rule: "task_ids_match_pattern"
      - id: "T2"
        description: "Mỗi task có description (min 10 chars)"
        rule: "descriptions_min_10_chars"
      - id: "T3"
        description: "Mỗi task có priority (critical|high|medium|low)"
        rule: "valid_priority"
      - id: "T4"
        description: "Mỗi task có zone (core|knowledge|scripts|templates|data|loop|assets)"
        rule: "valid_zone"
      - id: "T5"
        description: "Mỗi task có trace tag"
        rule: "all_tasks_have_trace"

  dag_integrity:
    description: "DAG phải là Directed Acyclic Graph - không có chu trình"
    checks:
      - id: "D1"
        description: "task_dependencies là adjacency list (object)"
        rule: "is_adjacency_list"
      - id: "D2"
        description: "Không có self-reference (T1.1 phụ thuộc T1.1)"
        rule: "no_self_references"
      - id: "D3"
        description: "Tất cả task IDs trong dependencies tồn tại"
        rule: "all_referenced_tasks_exist"
      - id: "D4"
        description: "Không có circular dependencies (DAG validation)"
        rule: "is_acyclic"
        severity: MUST
      - id: "D5"
        description: "Topological sort thành công"
        rule: "topological_sort_valid"

  trace_validation:
    enabled: true
    severity: MUST
    valid_tags:
      - "[TỪ DESIGN §[0-9]+]"
      - "[TỪ AUDIT TÀI NGUYÊN]"
      - "[GỢI Ý BỔ SUNG]"
      - "[CẦN LÀM RÕ]"
    invalid_tags:
      - "[TỪ DESIGN]"      # Thiếu section number
      - "[TỪ AUDIT]"       # Thiếu "TÀI NGUYÊN"
      - "[CẦU LÀM RÕ]"    # Typo
    checks:
      - id: "TR1"
        description: "Mọi task đều có trace tag"
        rule: "all_tasks_traced"
        severity: MUST
      - id: "TR2"
        description: "Trace tag format hợp lệ"
        rule: "trace_format_valid"
        severity: MUST
      - id: "TR3"
        description: "Không có legacy/invalid trace tags"
        rule: "no_invalid_tags"
        severity: MUST

  blockers:
    checks:
      - id: "B1"
        description: "blockers array tồn tại (có thể empty)"
        rule: "field_exists"
      - id: "B2"
        description: "Khi status = ready_for_builder, blockers must be empty"
        rule: "no_blockers_when_ready"
        severity: MUST
      - id: "B3"
        description: "Blocker có type hợp lệ (CLARIFICATION_NEEDED|DESIGN_CONFLICT|RESOURCE_MISSING)"
        rule: "valid_blocker_type"
      - id: "B4"
        description: "Blocker có mô tả và resolved flag"
        rule: "blockers_have_description_and_resolved"

  prerequisites:
    tier_values:
      - "domain"
      - "technical"
      - "packaging"
    status_values:
      - "rich"
      - "thin"
      - "missing"
    checks:
      - id: "PR1"
        description: "pre_requisites array tồn tại"
        rule: "field_exists"
      - id: "PR2"
        description: "Mỗi prerequisite có tier, resource, status"
        rule: "prerequisite_structure"
      - id: "PR3"
        description: "tier là enum value (domain|technical|packaging)"
        rule: "valid_tier"
      - id: "PR4"
        description: "status là enum value (rich|thin|missing)"
        rule: "valid_resource_status"

  handoff:
    checks:
      - id: "H1"
        description: "handoff.next_stage = builder"
        rule: "next_stage_is_builder"
      - id: "H2"
        description: "handoff.ready_condition.required tồn tại"
        rule: "has_ready_condition"
      - id: "H3"
        description: "ready_condition có đủ required fields"
        rule: "ready_condition_complete"
      - id: "H4"
        description: "Khi status = ready_for_builder, tất cả ready_condition phải true"
        rule: "ready_conditions_met"
        severity: MUST

  resource_verification:
    description: "Core resource integrity checks"
    checks:
      - id: "R1"
        description: "Tất cả resources trong pre_requisites có status"
        rule: "all_resources_have_status"
      - id: "R2"
        description: "Critical resources phải là 'rich' trước ready_for_builder"
        rule: "critical_resources_rich"
        severity: SHOULD
      - id: "R3"
        description: "Mỗi task có thể trace đến blueprint source"
        rule: "traceability_complete"
      - id: "R4"
        description: "PH0 tasks prepare resources cho PH1+"
        rule: "phase0_prepares_for_phase1"

output_format:
  show_passed: true
  show_failed: true
  show_warnings: true
  severity_levels:
    - "MUST"   # Fail = cannot deliver
    - "SHOULD" # Fail = warning but can deliver
    - "INFO"   # Always shown

severity_assignment:
  structure: MUST
  schema_compliance: MUST
  phases_structure: MUST
  tasks_structure: MUST
  dag_integrity: MUST
  trace_validation: MUST
  blockers: MUST
  prerequisites: MUST
  handoff: MUST
  resource_verification: SHOULD

# Gatekeeper Rule
gatekeeper:
  description: "Planner cannot mark ready_for_builder while blockers unresolved or DAG invalid"
  rule: "if status = ready_for_builder AND (blockers not empty OR DAG has cycles) THEN fail"

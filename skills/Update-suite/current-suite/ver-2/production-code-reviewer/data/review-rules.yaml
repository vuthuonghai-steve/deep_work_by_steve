# ===========================================================================
# GOOGLE CODE REVIEW RULES SCHEMA & CRITERIA MATRIX (68 Rules)
# ===========================================================================
# Location: skills/rebuild/production-code-reviewer/data/review-rules.yaml
# Purpose: Definitive rules for automated static code review, matching Google standards.
# Standards: High strictness, clear separation of Blocking (Must Fix) and Non-Blocking.
# ===========================================================================

comment_labels:
  nit:
    prefix: "Nit: "
    meaning: "Minor aesthetic or stylistic improvement. Non-blocking; the author can choose to ignore or implement."
  optional:
    prefix: "Optional: "
    meaning: "Valid suggestion but not critical to codebase health. Non-blocking."
  fyi:
    prefix: "FYI: "
    meaning: "For Your Information. Explanatory tip or learning resource. Non-blocking."
  blocking:
    prefix: "Must Fix: "
    meaning: "Critical issue affecting correctness, security, concurrency, or architecture. Blocking; must be resolved before approval."

categories:
  design:
    title: "Software Design & Decoupling (15 Rules)"
    standards:
      - id: "REV-DES-01"
        name: "SOLID - Single Responsibility Principle"
        description: "Verify that each class and function has only a single primary responsibility."
        severity: "blocking"
      - id: "REV-DES-02"
        name: "Speculative Programming (Over-Engineering)"
        description: "Flag any general abstractions designed for hypothetical future requirements. Code for today, not tomorrow."
        severity: "blocking"
      - id: "REV-DES-03"
        name: "Dependency Injection (DI)"
        description: "Hardcoded dependencies should be avoided. Use DI to inject DB connections, APIs, or config."
        severity: "blocking"
      - id: "REV-DES-04"
        name: "Global State Mutation"
        description: "Avoid modifying global variables directly inside functions; pass states explicitly."
        severity: "blocking"
      - id: "REV-DES-05"
        name: "Tightly Coupled Submodules"
        description: "Check for circular imports or heavy couplings between distinct domain packages."
        severity: "blocking"
      - id: "REV-DES-06"
        name: "Module Placement Hygiene"
        description: "Ensure new classes or methods belong in the correct directory/module rather than arbitrary folders."
        severity: "blocking"
      - id: "REV-DES-07"
        name: "Encapsulation Violation"
        description: "Internal variables and private methods should not be accessed directly from outside the class."
        severity: "blocking"
      - id: "REV-DES-08"
        name: "Inheritance vs Composition"
        description: "Prefer composition over deep inheritance hierarchies. Flag inheritance trees deeper than 3 levels."
        severity: "optional"
      - id: "REV-DES-09"
        name: "Interface/Abstract Compliance"
        description: "Check that subclass implementations correctly inherit and implement all abstract base method contracts."
        severity: "blocking"
      - id: "REV-DES-10"
        name: "Inversion of Control (IoC)"
        description: "High-level policy modules should not depend on low-level detail modules; both should depend on abstractions."
        severity: "blocking"
      - id: "REV-DES-11"
        name: "Configuration Isolation"
        description: "Avoid hardcoding configuration parameter strings; isolate configurations in a separate settings layer."
        severity: "blocking"
      - id: "REV-DES-12"
        name: "Law of Demeter"
        description: "Avoid chaining method calls deeply on objects that are retrieved from other objects (e.g. a.getB().getC().doX())."
        severity: "optional"
      - id: "REV-DES-13"
        name: "Factory Pattern for Complex Instantiation"
        description: "Flag instantiation of objects with complex constructor parameters; delegate to a factory method."
        severity: "optional"
      - id: "REV-DES-14"
        name: "Facade for Subsystem Access"
        description: "Check for complex API calls to a subsystem that can be unified under a simplified Facade interface."
        severity: "optional"
      - id: "REV-DES-15"
        name: "Data Transfer Object (DTO) Cleanliness"
        description: "Verify that classes meant to hold raw data do not contain heavy business logic."
        severity: "blocking"

  functionality:
    title: "Correctness, Security & Concurrency (15 Rules)"
    standards:
      - id: "REV-FUN-01"
        name: "Logical Correctness"
        description: "Verify that the implementation actually fulfills the functional requirement without logic bugs."
        severity: "blocking"
      - id: "REV-FUN-02"
        name: "Swallowed Exceptions"
        description: "Flag empty except blocks ('except: pass' or 'except Exception: pass') which swallow critical system errors."
        severity: "blocking"
      - id: "REV-FUN-03"
        name: "Unsafe Resource Management"
        description: "Flag files opened via open() without using a context manager ('with open') or manual try/finally closure."
        severity: "blocking"
      - id: "REV-FUN-04"
        name: "Unprotected Exception Boundaries"
        description: "Ensure IO operations, API calls, and DB operations are protected by explicit try/except blocks."
        severity: "blocking"
      - id: "REV-FUN-05"
        name: "Missing Requests/Socket Timeouts"
        description: "All HTTP requests or network socket operations must have explicit 'timeout' parameters set."
        severity: "blocking"
      - id: "REV-FUN-06"
        name: "Concurrency Locking Safety"
        description: "Ensure multi-threaded operations use Locks, Semaphores, or asyncio.Lock to prevent race conditions."
        severity: "blocking"
      - id: "REV-FUN-07"
        name: "Deadlock Potential"
        description: "Flag nested lock acquisitions that could lead to deadlocks if acquired in inconsistent orders."
        severity: "blocking"
      - id: "REV-FUN-08"
        name: "Shell Injection Risk"
        description: "Flag usage of subprocess.run() or os.system() with shell=True unless absolute string constants are used."
        severity: "blocking"
      - id: "REV-FUN-09"
        name: "SQL Injection Risk"
        description: "Flag dynamic string concatenation or f-strings inside database query executions."
        severity: "blocking"
      - id: "REV-FUN-10"
        name: "Path Traversal Risk"
        description: "Flag unsafe file path creations that concatenate user inputs directly without using os.path.abspath."
        severity: "blocking"
      - id: "REV-FUN-11"
        name: "Hardcoded Secrets"
        description: "Analyze string variables for hardcoded API keys, secrets, tokens, or passwords."
        severity: "blocking"
      - id: "REV-FUN-12"
        name: "Unsafe Cryptographic Hash"
        description: "Flag usage of MD5 or SHA1 for passwords or security hashes; enforce SHA-256 or bcrypt."
        severity: "blocking"
      - id: "REV-FUN-13"
        name: "Boundary Condition Errors"
        description: "Check array slicing, indices, or loops for potential off-by-one errors."
        severity: "blocking"
      - id: "REV-FUN-14"
        name: "Mutable Default Arguments"
        description: "Flag default function argument assignments with mutable objects like lists or dicts (e.g. def f(a=[]))."
        severity: "blocking"
      - id: "REV-FUN-15"
        name: "Socket Closure Leak"
        description: "Verify that network sockets are explicitly closed in finally blocks to prevent file descriptor leaks."
        severity: "blocking"

  complexity:
    title: "Simplicity & Clean Code (10 Rules)"
    standards:
      - id: "REV-CMP-01"
        name: "Excessive Function Length"
        description: "Flag public functions exceeding 50 lines of executable code for splitting."
        severity: "blocking"
      - id: "REV-CMP-02"
        name: "Control Flow Nesting Depth"
        description: "Flag nested loops or conditional checks exceeding 3 layers deep."
        severity: "blocking"
      - id: "REV-CMP-03"
        name: "High Cyclomatic Complexity"
        description: "Check for too many if/elif branches or loops in a single function (>15 branches)."
        severity: "blocking"
      - id: "REV-CMP-04"
        name: "Magic Numbers usage"
        description: "Flag raw numbers (except -1, 0, 1) in calculations that should be named constants."
        severity: "optional"
      - id: "REV-CMP-05"
        name: "Unnecessary Boolean Evaluations"
        description: "Flag redundant statements like 'if val == True' or 'return True if x else False'."
        severity: "nit"
      - id: "REV-CMP-06"
        name: "Dead/Deactivated Code Blocks"
        description: "Flag unused helper functions, classes, or commented-out large chunks of dead code."
        severity: "blocking"
      - id: "REV-CMP-07"
        name: "Recursion Depth Guard"
        description: "Ensure any recursive calls have an explicit base case and a safe depth boundary."
        severity: "blocking"
      - id: "REV-CMP-08"
        name: "Variable Re-assignment Pollution"
        description: "Flag reusing the same variable name for entirely different data types within the same scope."
        severity: "optional"
      - id: "REV-CMP-09"
        name: "Ternary Operator Abuse"
        description: "Flag nested ternary conditional operators which severely degrade code readability."
        severity: "blocking"
      - id: "REV-CMP-10"
        name: "Long Expression Splitting"
        description: "Flag lines of code exceeding 100 characters; enforce splitting into multiple readable statements."
        severity: "nit"

  testing:
    title: "Test Coverage & Quality (8 Rules)"
    standards:
      - id: "REV-TST-01"
        name: "Required Test File Presence"
        description: "Verify that the code file has a matching unit test file (e.g. test_*.py) in the codebase."
        severity: "blocking"
      - id: "REV-TST-02"
        name: "Test Case Coverage Density"
        description: "Ensure that the test file has at least 5 meaningful test cases checking success/failure states."
        severity: "blocking"
      - id: "REV-TST-03"
        name: "Mocking External Network Calls"
        description: "Ensure that tests do not make actual network requests; verify usage of mocks or fixtures."
        severity: "blocking"
      - id: "REV-TST-04"
        name: "Mocking Database operations"
        description: "Verify that tests use a mock database or an in-memory db instead of the real production DB."
        severity: "blocking"
      - id: "REV-TST-05"
        name: "Assertions Quality"
        description: "Flag lazy assertions like 'assert True' or 'assert res is not None' when value validation is possible."
        severity: "blocking"
      - id: "REV-TST-06"
        name: "Test Name Readability"
        description: "Check that test case function names clearly describe the scenario under test (e.g. test_billing_failure_on_empty_card)."
        severity: "nit"
      - id: "REV-TST-07"
        name: "Deterministic Testing"
        description: "Flag unit tests that rely on real-world system clock time or external dynamic files without mocking."
        severity: "blocking"
      - id: "REV-TST-08"
        name: "Test Cleanliness (No Side Effects)"
        description: "Ensure tests clean up temporary files or DB rows generated during their runs using tearDown or fixtures."
        severity: "blocking"

  style:
    title: "Style & Naming Standards (8 Rules)"
    standards:
      - id: "REV-STY-01"
        name: "PEP 8 Snake Case for Functions"
        description: "Check that function and method names conform to lower_case_with_underscores style."
        severity: "blocking"
      - id: "REV-STY-02"
        name: "PEP 8 Pascal Case for Classes"
        description: "Check that class names conform to CamelCase/PascalCase style."
        severity: "blocking"
      - id: "REV-STY-03"
        name: "Meaningful Variable Names"
        description: "Flag overly brief variable names like x, y, temp, data unless in mathematical scopes or loop indices."
        severity: "blocking"
      - id: "REV-STY-04"
        name: "Unused Imported Modules"
        description: "Flag imported libraries or local modules that are never referenced in the active file."
        severity: "blocking"
      - id: "REV-STY-05"
        name: "Unused Local Variables"
        description: "Flag local variables defined inside a function that are never read."
        severity: "blocking"
      - id: "REV-STY-06"
        name: "PEP 8 Import Ordering"
        description: "Verify standard library imports are listed first, then third-party libraries, then local submodules."
        severity: "nit"
      - id: "REV-STY-07"
        name: "Line Continuation Standards"
        description: "Check for clean alignment in continuation lines for function arguments or list brackets."
        severity: "nit"
      - id: "REV-STY-08"
        name: "Code Formatting Consistency"
        description: "Ensure spacing around operators, commas, and colons conforms strictly to PEP 8 standards."
        severity: "nit"

  comments:
    title: "Comments & Documentation (7 Rules)"
    standards:
      - id: "REV-CMT-01"
        name: "Comments explain 'Why', not 'What'"
        description: "Enforce comments that explain the architectural design rationale, rather than reciting what the code does."
        severity: "blocking"
      - id: "REV-CMT-02"
        name: "Public API Docstring Coverage"
        description: "Check that public methods and modules are documented explaining usage and params."
        severity: "blocking"
      - id: "REV-CMT-03"
        name: "Unregistered TODO Comments"
        description: "Ensure that any TODO comment contains a ticket reference ID (e.g. TODO(bug-1234): ...)."
        severity: "blocking"
      - id: "REV-CMT-04"
        name: "Docstring Formatting"
        description: "Ensure docstrings conform to Google Python Style Guide docstring standards (Args:, Returns:, Raises:)."
        severity: "nit"
      - id: "REV-CMT-05"
        name: "Regular Expression Comments"
        description: "Ensure complex regular expressions are accompanied by a comment explaining the matched groups."
        severity: "blocking"
      - id: "REV-CMT-06"
        name: "Math Algorithm Explanations"
        description: "Complex formulas or custom algorithms must have comments detailing the mathematical references."
        severity: "blocking"
      - id: "REV-CMT-07"
        name: "Up-to-date README/Docs"
        description: "If system builds or APIs change, verify that corresponding documentation files are updated."
        severity: "blocking"

  cl_size:
    title: "CL Size & Scope (5 Rules)"
    standards:
      - id: "REV-SIZ-01"
        name: "One Self-Contained Scope"
        description: "Ensure the change solves exactly one cohesive problem. Do not bundle unrelated changes together."
        severity: "blocking"
      - id: "REV-SIZ-02"
        name: "Split Refactoring from Logic"
        description: "Strictly separate refactoring tasks (renaming, reorganizing) from new feature additions in different CLs."
        severity: "blocking"
      - id: "REV-SIZ-03"
        name: "Keep Changes Under 200 Lines"
        description: "Maintain changes below 200 lines of code for fast, high-quality reviews (excluding tests/generated files)."
        severity: "optional"
      - id: "REV-SIZ-04"
        name: "Provide Calling Context"
        description: "New APIs or libraries must have at least one caller or integration usage included in the CL."
        severity: "blocking"
      - id: "REV-SIZ-05"
        name: "CL Description Imperative Style"
        description: "First line of CL description must be in imperative style (e.g. 'Delete old RPC', not 'Deleting old RPC')."
        severity: "blocking"

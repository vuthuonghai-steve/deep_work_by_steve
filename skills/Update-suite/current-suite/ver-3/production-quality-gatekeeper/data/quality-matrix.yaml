# ===========================================================================
# PRODUCTION QUALITY MASTER MATRIX CONFIGURATION (100+ Criteria)
# ===========================================================================
# Location: skills/rebuild/production-quality-gatekeeper/data/quality-matrix.yaml
# Purpose: Single source of truth for programmatic quality gates across 3 domains.
# Standards: Extremely strict, fully specified, no placeholders.
# ===========================================================================

domains:
  creative:
    title: "Lĩnh vực Sáng tạo & Biên soạn nội dung (30 Criteria)"
    criteria:
      # Tầng 1: Kiến trúc & Bố cục (Structure & Pacing)
      - id: "CR-1.01"
        name: "Cấu trúc 3 Hồi chuẩn (Act 1-2-3)"
        description: "Bắt buộc có phần Mở đầu giới thiệu bối cảnh, Thân bài có xung đột tăng dần và Kết bài giải quyết trọn vẹn xung đột."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(mở đầu|đặt vấn đề|giới thiệu|bối cảnh).*(thách thức|mâu thuẫn|xung đột|phát triển).*(kết luận|giải quyết|kết thúc|tóm lại)"
      - id: "CR-1.02"
        name: "Câu dẫn khởi đầu ấn tượng (The Hook)"
        description: "10% số từ đầu tiên phải chứa câu hỏi tu từ, trích dẫn triết học hoặc câu khẳng định mạnh mẽ để thu hút người đọc."
        severity: "major"
        check_type: "regex_match"
        pattern: "(\\?|!|quyết định|sự thật|bất ngờ|tại sao|không thể)"
      - id: "CR-1.03"
        name: "Phân bổ độ dài đoạn văn (Pacing Flow)"
        description: "Không được có đoạn văn nào dài liên tục quá 150 từ mà không ngắt dòng. Đoạn văn ngắn dài đan xen để tạo nhịp thở."
        severity: "major"
        check_type: "pacing_flow"
        max_words_per_paragraph: 150
      - id: "CR-1.04"
        name: "Tính nhất quán ngôi kể"
        description: "Tuyệt đối không thay đổi đại từ nhân xưng đột ngột (đang tôi chuyển sang chúng ta hoặc người viết)."
        severity: "critical"
        check_type: "pronoun_consistency"
      - id: "CR-1.05"
        name: "Sử dụng tiêu đề phân cấp hợp lý"
        description: "Nội dung trên 500 từ phải có ít nhất 3 tiêu đề phụ (Markdown H2, H3) để định hình luồng tư duy."
        severity: "major"
        check_type: "heading_density"
        min_headings: 3
      - id: "CR-1.06"
        name: "Liên kết chuyển đoạn mượt mà"
        description: "Các đoạn văn kế tiếp phải sử dụng từ nối chuyển tiếp (Tuy nhiên, Bên cạnh đó, Đồng thời, Trái lại, Nhờ vậy)."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(tuy nhiên|bên cạnh đó|đồng thời|trái lại|nhờ vậy|hơn nữa|vì thế)"
      - id: "CR-1.07"
        name: "Độ dài tổng thể tối thiểu"
        description: "Bài biên soạn hoàn chỉnh phải đạt độ dài tối thiểu từ 300 từ trở lên để đảm bảo chiều sâu kiến thức."
        severity: "critical"
        check_type: "min_words"
        min_words: 300
      - id: "CR-1.08"
        name: "Tóm tắt hành động mở đầu"
        description: "Phần mở bài phải phác thảo sơ lược những gì người đọc sẽ nhận được."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(bài viết này|chúng ta sẽ|khám phá|tìm hiểu)"
      - id: "CR-1.09"
        name: "Điểm nhấn thông điệp cuối bài"
        description: "Kết luận phải đọng lại một thông điệp triết lý sâu sắc, lời khuyên hành động cụ thể."
        severity: "major"
        check_type: "regex_match"
        pattern: "(hãy|cần phải|bài học|thông điệp|chìa khóa)"
      - id: "CR-1.10"
        name: "Tránh kết bài sáo rỗng"
        description: "Không sử dụng các cụm từ kết luận lười biếng như 'Tóm lại...', 'Sau tất cả...'"
        severity: "minor"
        check_type: "keyword_block"
        blocked_keywords: ["tóm lại là", "sau tất cả", "nhìn chung lại"]

      # Tầng 2: Vệ sinh ngôn từ & Tránh AI Cliche (Language & Cliché Prevention)
      - id: "CR-2.01"
        name: "Không chứa từ AI cấm - delve"
        description: "Tuyệt đối không sử dụng từ 'delve' trong tiếng Anh."
        severity: "critical"
        check_type: "keyword_block"
        blocked_keywords: ["delve"]
      - id: "CR-2.02"
        name: "Không chứa từ AI cấm - tapestry"
        description: "Tuyệt đối không sử dụng từ 'tapestry' hoặc các biến thể dịch nghĩa 'bức tranh thêu dệt'."
        severity: "critical"
        check_type: "keyword_block"
        blocked_keywords: ["tapestry", "bức tranh thêu dệt", "bức tranh dệt nên"]
      - id: "CR-2.03"
        name: "Không chứa từ AI cấm - testament"
        description: "Tuyệt đối không sử dụng từ 'testament' hoặc 'minh chứng cho'."
        severity: "critical"
        check_type: "keyword_block"
        blocked_keywords: ["testament", "minh chứng cho", "minh chứng sống động"]
      - id: "CR-2.04"
        name: "Không chứa từ AI cấm - beacon"
        description: "Tuyệt đối không sử dụng từ 'beacon' hoặc 'ngọn hải đăng'."
        severity: "major"
        check_type: "keyword_block"
        blocked_keywords: ["beacon", "ngọn hải đăng"]
      - id: "CR-2.05"
        name: "Không chứa từ AI cấm - multifaceted"
        description: "Tuyệt đối không sử dụng từ 'multifaceted' hoặc 'đa khía cạnh'."
        severity: "major"
        check_type: "keyword_block"
        blocked_keywords: ["multifaceted", "đa khía cạnh", "nhiều mặt"]
      - id: "CR-2.06"
        name: "Không chứa từ AI cấm - plethora"
        description: "Tuyệt đối không sử dụng từ 'plethora' hoặc 'vô số'."
        severity: "major"
        check_type: "keyword_block"
        blocked_keywords: ["plethora", "vô số kể"]
      - id: "CR-2.07"
        name: "Không chứa từ AI cấm - nestled"
        description: "Tuyệt đối không sử dụng từ 'nestled' hoặc 'ẩn mình'."
        severity: "minor"
        check_type: "keyword_block"
        blocked_keywords: ["nestled", "ẩn mình"]
      - id: "CR-2.08"
        name: "Không chứa từ AI cấm - whispers/dance"
        description: "Tuyệt đối không sử dụng từ 'whispers' (tiếng thì thầm) hoặc 'dance between' (vũ điệu giữa)."
        severity: "minor"
        check_type: "keyword_block"
        blocked_keywords: ["whispers of", "dance between", "tiếng thì thầm", "vũ điệu giữa"]
      - id: "CR-2.09"
        name: "Show, Don't Tell (Trực quan hóa)"
        description: "Thay thế các tính từ trừu tượng (đẹp, buồn, sợ) bằng mô tả hành vi, hình ảnh cụ thể."
        severity: "major"
        check_type: "regex_match"
        pattern: "(như|tựa như|mắt|tay|rung|khóc|nhìn|chứng kiến|cảm nhận)"
      - id: "CR-2.10"
        name: "Cân bằng giọng điệu chủ động"
        description: "Giới hạn sử dụng thể bị động (bị, được) dưới 10% tổng số câu."
        severity: "minor"
        check_type: "passive_voice_limit"
        max_passive_ratio: 0.10

      # Tầng 3: Tinh tế Nghệ thuật (Artistry & Subtext)
      - id: "CR-3.01"
        name: "Ẩn dụ đa tầng thống nhất"
        description: "Có ít nhất một biểu tượng ẩn dụ xuất hiện xuyên suốt đầu, giữa và cuối bài viết."
        severity: "major"
        check_type: "regex_match"
        pattern: "(biểu tượng|ẩn dụ|hình ảnh|tượng trưng)"
      - id: "CR-3.02"
        name: "Nhạc điệu từ ngữ (Alliteration/Flow)"
        description: "Tránh các từ ngữ lặp âm vô ý nghĩa hoặc câu văn quá lủng củng trắc trở."
        severity: "minor"
        check_type: "flow_smoothness"
      - id: "CR-3.03"
        name: "Hội thoại tự nhiên (nếu có)"
        description: "Các câu đối thoại phải ngắn gọn, mang sắc thái cá nhân, tránh kể lể dài dòng."
        severity: "minor"
        check_type: "dialog_naturalness"
      - id: "CR-3.04"
        name: "Khơi gợi tò mò (Zeigarnik Effect)"
        description: "Tạo các điểm bỏ ngỏ ở cuối hồi 1 và 2 để kích thích sự tò mò của người đọc."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(nhưng|liệu|bất ngờ|chờ đợi|bí ẩn|phía trước)"
      - id: "CR-3.05"
        name: "Tính độc bản cá nhân (Tone & Voice)"
        description: "Văn phong phải mang đậm bản sắc cá nhân lập trình viên hoặc chuyên gia, tránh văn phong robot trung dung."
        severity: "major"
        check_type: "regex_match"
        pattern: "(quan điểm|kinh nghiệm|thực tế|tôi tin|trải nghiệm)"
      - id: "CR-3.06"
        name: "Hạn chế trạng từ chỉ mức độ"
        description: "Hạn chế tối đa việc lạm dụng các từ 'rất', 'cực kỳ', 'quá' gây loãng ý nghĩa."
        severity: "minor"
        check_type: "keyword_block"
        blocked_keywords: ["cực kỳ tuyệt vời", "rất rất", "quá mức tuyệt vời"]
      - id: "CR-3.07"
        name: "Trích dẫn nguồn uy tín"
        description: "Có ít nhất một trích dẫn từ nguồn nghiên cứu, sách báo hoặc câu nói nổi tiếng của danh nhân."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(theo|trích dẫn|nói rằng|nghiên cứu|nhận định)"
      - id: "CR-3.08"
        name: "Rõ ràng mục tiêu đối tượng"
        description: "Định nghĩa rõ nhóm độc giả mục tiêu trong câu mở đầu hoặc phần giới thiệu."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(lập trình viên|nhà phát triển|kỹ sư|cho những ai|dành cho)"
      - id: "CR-3.09"
        name: "Formatting chuẩn mực Markdown"
        description: "Sử dụng in đậm (**), in nghiêng (*), code block (`) và danh sách gạch đầu dòng một cách khoa học."
        severity: "major"
        check_type: "markdown_formatting"
      - id: "CR-3.10"
        name: "Kết thúc gợi mở"
        description: "Kết bài mở rộng thêm một câu hỏi gợi suy ngẫm cho người đọc thay vì đóng khung vấn đề."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(\\?|nghĩ sao|liệu rằng|bạn có)"

  dev:
    title: "Lĩnh vực Lập trình & Kỹ thuật phần mềm (40 Criteria)"
    criteria:
      # Tầng 1: Kiến trúc & SOLID (Architecture & Clean Design)
      - id: "DEV-1.01"
        name: "SOLID - Single Responsibility Principle"
        description: "Mỗi hàm/phương thức phải có độ dài thân hàm tối đa 50 dòng code thực thi."
        severity: "critical"
        check_type: "ast_function_length"
        max_lines: 50
      - id: "DEV-1.02"
        name: "Tài liệu hóa hàm public (Docstrings)"
        description: "Tất cả các hàm public bắt buộc phải có docstring giải thích tham số đầu vào và kiểu trả về."
        severity: "critical"
        check_type: "ast_docstring_coverage"
      - id: "DEV-1.03"
        name: "Tài liệu hóa Class"
        description: "Mọi class định nghĩa mới phải có docstring mô tả vai trò và thuộc tính."
        severity: "major"
        check_type: "ast_class_docstring"
      - id: "DEV-1.04"
        name: "Đặt tên hàm đúng chuẩn Python"
        description: "Tất cả tên hàm phải tuân thủ nghiêm ngặt chuẩn snake_case."
        severity: "critical"
        check_type: "ast_naming_convention"
        naming_style: "snake_case"
        target: "functions"
      - id: "DEV-1.05"
        name: "Đặt tên Class đúng chuẩn Python"
        description: "Tất cả tên Class phải tuân thủ nghiêm ngặt chuẩn PascalCase."
        severity: "critical"
        check_type: "ast_naming_convention"
        naming_style: "PascalCase"
        target: "classes"
      - id: "DEV-1.06"
        name: "Đặt tên biến đúng chuẩn Python"
        description: "Tất cả các biến phải dùng snake_case và có độ dài tối thiểu 3 ký tự (ngoại trừ biến vòng lặp i, j, k, e)."
        severity: "major"
        check_type: "ast_naming_convention"
        naming_style: "snake_case"
        target: "variables"
        min_length: 3
      - id: "DEV-1.07"
        name: "Tuyệt đối không nuốt Exception"
        description: "Cấm sử dụng khối except rỗng hoặc 'except: pass' / 'except Exception: pass' nuốt chửng lỗi."
        severity: "critical"
        check_type: "ast_exception_swallowing"
      - id: "DEV-1.08"
        name: "Bảo vệ các ranh giới ngoại vi"
        description: "Các thao tác I/O như open tệp tin, requests API hoặc database call phải bọc trong try/except."
        severity: "critical"
        check_type: "ast_exception_boundaries"
      - id: "DEV-1.09"
        name: "Sử dụng Context Manager quản lý file"
        description: "Tuyệt đối không mở file bằng open() thô gán biến mà không bọc trong cấu trúc 'with open'."
        severity: "critical"
        check_type: "ast_resource_management"
        resource_type: "file"
      - id: "DEV-1.10"
        name: "Đóng kết nối Socket & DB an toàn"
        description: "Mọi kết nối socket hoặc DB mở ra phải được đóng trong khối 'finally' hoặc quản lý qua context manager."
        severity: "critical"
        check_type: "ast_resource_management"
        resource_type: "socket_db"

      # Tầng 2: Vận hành & An toàn Concurrency (Operational & Concurrency Safety)
      - id: "DEV-2.01"
        name: "Bảo vệ tương tranh (Concurrency Lock)"
        description: "Nếu có import 'threading' hoặc 'multiprocessing', mọi chia sẻ biến/tài nguyên chung phải dùng Lock/Semaphore."
        severity: "critical"
        check_type: "ast_concurrency_safety"
      - id: "DEV-2.02"
        name: "Phòng tránh Deadlock tương tranh"
        description: "Không được phép lock lồng nhau từ 2 đối tượng Lock khác nhau mà không sắp xếp thứ tự lock nhất quán."
        severity: "critical"
        check_type: "ast_deadlock_prevention"
      - id: "DEV-2.03"
        name: "Làm sạch biến không sử dụng (Unused variables)"
        description: "Không được định nghĩa biến cục bộ trong hàm mà không sử dụng."
        severity: "major"
        check_type: "ast_unused_variables"
      - id: "DEV-2.04"
        name: "Làm sạch Import không sử dụng (Unused imports)"
        description: "Không được import các module thư viện mà không dùng tới trong file."
        severity: "major"
        check_type: "ast_unused_imports"
      - id: "DEV-2.05"
        name: "Không lạm dụng số ma thuật (Magic Numbers)"
        description: "Mọi số khác -1, 0, 1 sử dụng trong logic tính toán phải được định nghĩa dưới dạng HẰNG SỐ viết hoa."
        severity: "major"
        check_type: "ast_magic_numbers"
      - id: "DEV-2.06"
        name: "Tránh đường dẫn cứng (Hardcoded Paths)"
        description: "Cấm sử dụng đường dẫn tuyệt đối cứng (ví dụ: '/home/steve/...') trong code; sử dụng Path hay relative path."
        severity: "major"
        check_type: "regex_hardcoded_paths"
      - id: "DEV-2.07"
        name: "Bắt buộc có tệp Unit Test đi kèm"
        description: "Mã nguồn chính phải đi kèm file test tương ứng (ví dụ: test_*.py) nằm cùng thư mục hoặc trong tests/."
        severity: "critical"
        check_type: "test_file_existence"
      - id: "DEV-2.08"
        name: "Chất lượng Unit Test tối thiểu"
        description: "File test đi kèm phải chứa tối thiểu 5 test cases bao phủ các biên thành công/thất bại."
        severity: "critical"
        check_type: "test_cases_density"
        min_cases: 5
      - id: "DEV-2.09"
        name: "Sử dụng Mocking trong Test"
        description: "Các thao tác API mạng hoặc DB trong Unit Test phải được mock qua unittest.mock, không gọi thật."
        severity: "major"
        check_type: "ast_mocking_validation"
      - id: "DEV-2.10"
        name: "Sắp xếp Import chuẩn PEP 8"
        description: "Imports phải được chia thành 3 khối phân biệt: Thư viện chuẩn, Thư viện bên thứ ba, và Module cục bộ."
        severity: "minor"
        check_type: "import_sorting"

      # Tầng 3: Kiểm soát Luồng & Độ phức tạp (Complexity & Flow Control)
      - id: "DEV-3.01"
        name: "Giới hạn độ lồng điều khiển (Nesting Depth)"
        description: "Độ lồng tối đa của các khối if/for/while không được vượt quá 3 lớp."
        severity: "critical"
        check_type: "ast_nesting_depth"
        max_depth: 3
      - id: "DEV-3.02"
        name: "Giới hạn độ phức tạp Cyclomatic Complexity"
        description: "Chỉ số phức tạp cyclomatic dựa trên số nhánh rẽ trong hàm không được vượt quá 15."
        severity: "critical"
        check_type: "ast_complexity_score"
        max_complexity: 15
      - id: "DEV-3.03"
        name: "Độ đệ quy an toàn"
        description: "Nếu hàm có gọi đệ quy, bắt buộc phải có điều kiện dừng rõ ràng ở đầu hàm."
        severity: "critical"
        check_type: "ast_recursion_safety"
      - id: "DEV-3.04"
        name: "Tránh biến toàn cục khả biến (Global variables)"
        description: "Tránh thay đổi trạng thái của các biến toàn cục (global) trực tiếp trong các hàm."
        severity: "major"
        check_type: "ast_global_variables"
      - id: "DEV-3.05"
        name: "Bảo vệ tham số khả biến đầu vào"
        description: "Không gán mặc định tham số hàm bằng danh sách hoặc dict khả biến (ví dụ: cấm `def func(a=[])`)."
        severity: "critical"
        check_type: "ast_mutable_default_args"
      - id: "DEV-3.06"
        name: "Chống Shell Injection bảo mật"
        description: "Khi gọi subprocess.run, cấm sử dụng shell=True trừ khi câu lệnh là hằng số hoàn toàn."
        severity: "critical"
        check_type: "regex_shell_injection"
      - id: "DEV-3.07"
        name: "Chống SQL Injection bảo mật"
        description: "Cấm nối chuỗi SQL bằng toán tử '+' hoặc f-string; phải sử dụng parameterized queries."
        severity: "critical"
        check_type: "regex_sql_injection"
      - id: "DEV-3.08"
        name: "Chống Path Traversal bảo mật"
        description: "Khi ghép đường dẫn tệp từ input, phải dùng os.path.abspath và kiểm tra tiền tố thư mục gốc."
        severity: "critical"
        check_type: "regex_path_traversal"
      - id: "DEV-3.09"
        name: "Mã hóa bảo mật nâng cao"
        description: "Tuyệt đối không dùng thuật toán MD5 hoặc SHA1 để băm mật khẩu/dữ liệu nhạy cảm."
        severity: "critical"
        check_type: "keyword_block"
        blocked_keywords: ["hashlib.md5", "hashlib.sha1", "cryptography.hazmat"]
      - id: "DEV-3.10"
        name: "Cấm rò rỉ Secrets trong mã nguồn"
        description: "Không được gán khóa bí mật (API key, password, token) trực tiếp trong code dạng chuỗi trần."
        severity: "critical"
        check_type: "regex_hardcoded_secrets"

      # Tầng 4: Clean Code & Chuẩn hóa (Clean Code & Hygiene)
      - id: "DEV-4.01"
        name: "Giới hạn độ dài Class"
        description: "Tổng số dòng của một class không được vượt quá 300 dòng."
        severity: "major"
        check_type: "ast_class_length"
        max_lines: 300
      - id: "DEV-4.02"
        name: "Giới hạn số tham số của hàm"
        description: "Một hàm/phương thức không được nhận quá 5 tham số đầu vào (nếu nhiều hơn, đóng gói thành object/dict)."
        severity: "major"
        check_type: "ast_argument_limit"
        max_args: 5
      - id: "DEV-4.03"
        name: "Tính nhất quán của câu lệnh Return"
        description: "Trong cùng một hàm, không được trộn lẫn việc có return giá trị và return không giá trị."
        severity: "major"
        check_type: "ast_return_consistency"
      - id: "DEV-4.04"
        name: "Đầy đủ package entry (__init__.py)"
        description: "Các thư mục chứa module mã nguồn lập trình phải có file __init__.py hợp lệ."
        severity: "major"
        check_type: "init_file_existence"
      - id: "DEV-4.05"
        name: "Tránh mã nguồn trùng lặp (DRY)"
        description: "Không có khối mã nguồn trùng lặp hoàn toàn trên 10 dòng ở các hàm khác nhau."
        severity: "major"
        check_type: "duplicate_code_detection"
      - id: "DEV-4.06"
        name: "Sử dụng Type Hints chuẩn"
        description: "Các hàm public bắt buộc phải khai báo Type Hints cho tham số và kiểu trả về."
        severity: "major"
        check_type: "ast_type_hints"
      - id: "DEV-4.07"
        name: "Kiểm tra Null/None an toàn"
        description: "Phải kiểm tra None trước khi truy cập thuộc tính của các đối tượng khả nghi."
        severity: "major"
        check_type: "ast_none_checks"
      - id: "DEV-4.08"
        name: "Thiết lập Timeout cho kết nối mạng"
        description: "Mọi cuộc gọi requests.get/post hoặc socket connect bắt buộc phải truyền tham số 'timeout'."
        severity: "critical"
        check_type: "ast_timeout_presence"
      - id: "DEV-4.09"
        name: "Sử dụng Logging thay vì raw Print"
        description: "Tuyệt đối không dùng lệnh print() để ghi log lỗi hoặc debug trong môi trường production; dùng thư viện logging."
        severity: "major"
        check_type: "ast_logging_usage"
      - id: "DEV-4.10"
        name: "Bảo trì Comment cũ"
        description: "Xóa toàn bộ các đoạn code cũ bị comment hóa (mã chết) để giữ tệp tin sạch sẽ."
        severity: "major"
        check_type: "dead_comment_clean"

  llm:
    title: "Lĩnh vực Prompt Engineering & LLM Evaluation (30 Criteria)"
    criteria:
      # Tầng 1: Ràng buộc cấu trúc (Prompt Architecture Rules)
      - id: "LLM-1.01"
        name: "Khối neo bắt buộc <instructions>"
        description: "Bắt buộc có tag XML <instructions> cô lập tất cả các chỉ thị cứng hành vi của tác nhân."
        severity: "critical"
        check_type: "xml_tag_existence"
        tag: "instructions"
      - id: "LLM-1.02"
        name: "Phân cấp YAML must/must_not trong instructions"
        description: "Khối instructions phải định dạng bằng cú pháp YAML hợp lệ, chứa hai nhánh con bắt buộc là 'must:' và 'must_not:'."
        severity: "critical"
        check_type: "yaml_instructions_syntax"
      - id: "LLM-1.03"
        name: "Khối neo cách ly dữ liệu <context>"
        description: "Bắt buộc sử dụng thẻ <context> để bao bọc các tài nguyên kiến thức nền tảng cung cấp cho mô hình."
        severity: "critical"
        check_type: "xml_tag_existence"
        tag: "context"
      - id: "LLM-1.04"
        name: "Khối neo cách ly dữ liệu đầu vào <input>"
        description: "Mọi dữ liệu động đầu vào nhận từ người dùng phải được cách ly tuyệt đối trong thẻ <input> hoặc <raw_input>."
        severity: "critical"
        check_type: "xml_tag_existence"
        tag: "input"
      - id: "LLM-1.05"
        name: "Hợp đồng định dạng đầu ra <output_contract>"
        description: "Cuối prompt bắt buộc có thẻ <output_contract> đặc tả định dạng đầu ra (format, include, schema)."
        severity: "critical"
        check_type: "xml_tag_existence"
        tag: "output_contract"
      - id: "LLM-1.06"
        name: "Trace Tag bắt buộc trong instructions"
        description: "Mẫu chỉ thị phải bắt buộc tác nhân gắn nhãn truy vết nguồn gốc (Trace Tag) [TỪ DESIGN §N] khi phản hồi."
        severity: "major"
        check_type: "regex_match"
        pattern: "(trace tag|\\[TỪ DESIGN)"
      - id: "LLM-1.07"
        name: "Chống Prompt Injection"
        description: "Prompt phải có điều khoản cảnh báo mô hình không được thực thi lệnh hoặc phá vỡ instructions chứa trong input của user."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(prompt injection|không thực thi|cấm ghi đè|chỉ xem như dữ liệu)"
      - id: "LLM-1.08"
        name: "Đặc tả định dạng đầu ra cụ thể"
        description: "Khối output_contract phải chỉ rõ định dạng là JSON, YAML, hay Markdown, cấm bỏ lửng chung chung."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(format: json|format: yaml|format: markdown)"
      - id: "LLM-1.09"
        name: "Chỉ thị chống ảo tưởng (Anti-Hallucination)"
        description: "Bắt buộc có câu lệnh cấm đoán mò kiến thức, yêu cầu nói 'tôi không biết' nếu tài liệu không cung cấp thông tin."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(không biết|ảo tưởng|không được đoán|tránh bịa đặt|chỉ dựa vào)"
      - id: "LLM-1.10"
        name: "Cấm rò rỉ tag XML trong đầu ra"
        description: "instructions phải dặn dò mô hình đóng các thẻ XML đầu ra một cách chuẩn xác, không làm rách cấu trúc thẻ."
        severity: "major"
        check_type: "regex_match"
        pattern: "(đóng thẻ|rách cấu trúc|xml tag)"

      # Tầng 2: Tối ưu hóa Context & Token (Context & Token Optimization)
      - id: "LLM-2.01"
        name: "Phân vùng Progressive Disclosure Tiers"
        description: "Prompt mô tả rõ kế hoạch nạp tài nguyên theo 3 phân cấp Tier 1, Tier 2, Tier 3 để tối ưu hóa context window."
        severity: "major"
        check_type: "regex_match"
        pattern: "(progressive disclosure|phân vùng|tier 1|tier 2|tier 3)"
      - id: "LLM-2.02"
        name: "Giới hạn dung lượng System Prompt"
        description: "System Prompt chính thức (SKILL.md) không được dài quá 1500 từ để tránh làm mờ instructions."
        severity: "major"
        check_type: "prompt_length_check"
        max_words: 1500
      - id: "LLM-2.03"
        name: "Cô lập System Prompt"
        description: "Bảo đảm chỉ chứa hướng dẫn cấu trúc và chỉ thị hành vi, không chứa ví dụ vài ngàn dòng code bừa bãi."
        severity: "major"
        check_type: "regex_match"
        pattern: "(cấu trúc|persona|hành vi)"
      - id: "LLM-2.04"
        name: "Thiết kế Few-Shot chuẩn mực"
        description: "Nếu có ví dụ Few-Shot mẫu, chúng phải được đặt riêng biệt trong khối `<examples>`."
        severity: "major"
        check_type: "few_shot_structure"
      - id: "LLM-2.05"
        name: "Định nghĩa Persona sắc nét"
        description: "Có câu lệnh khai báo rõ ràng vai trò chuyên gia, trình độ kinh nghiệm và thái độ ứng xử của tác nhân."
        severity: "major"
        check_type: "regex_match"
        pattern: "(đóng vai|vai trò|chuyên gia|persona|kinh nghiệm)"
      - id: "LLM-2.06"
        name: "Không chứa bình luận thừa trong prompt"
        description: "Các comment giải thích trong prompt phải cực kỳ ngắn gọn, không viết tràn lan làm loãng sự tập trung của LLM."
        severity: "minor"
        check_type: "prompt_comment_density"
      - id: "LLM-2.07"
        name: "Chỉ thị tư duy từng bước (Chain of Thought)"
        description: "Yêu cầu mô hình suy nghĩ phân tích sâu trước khi trả lời và bọc suy nghĩ đó trong thẻ `<thought>`."
        severity: "major"
        check_type: "regex_match"
        pattern: "(suy nghĩ|từng bước|chain of thought|thought tag|<thought>)"
      - id: "LLM-2.08"
        name: "Ràng buộc biến nội suy an toàn"
        description: "Mọi tham số động nội suy vào prompt phải dùng dấu ngoặc nhọn đôi hoặc đơn nhất quán (ví dụ: {variable})."
        severity: "major"
        check_type: "regex_match"
        pattern: "(\\{[a-zA-Z_]+\\})"
      - id: "LLM-2.09"
        name: "Hạn chế sử dụng câu phủ định kép"
        description: "Tránh các câu lệnh phủ định kép gây nhầm lẫn logic cho mô hình LLM."
        severity: "minor"
        check_type: "double_negative_check"
      - id: "LLM-2.10"
        name: "Chuẩn hóa bảng mã ký tự UTF-8"
        description: "Prompt phải được mã hóa chuẩn UTF-8, không lỗi hiển thị tiếng Việt có dấu."
        severity: "minor"
        check_type: "utf8_validation"

      # Tầng 3: Tự động hóa Vòng lặp & Rollback (Verification & Loops)
      - id: "LLM-3.01"
        name: "Định nghĩa Vòng lặp tự phản biện (Self-Refining Loop)"
        description: "Prompt phải thiết lập quy trình tự động lặp kiểm thử tối đa 10 lượt cho tới khi đạt điểm tuyệt đối."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(vòng lặp|refine|lặp|1-10 turn|self-refine|10 lần)"
      - id: "LLM-3.02"
        name: "Cơ chế Rollback khôi phục lỗi"
        description: "Có kịch bản rollback khôi phục lại trạng thái tốt nhất trước đó nếu lượt hiệu chỉnh mới làm phát sinh lỗi nghiêm trọng."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(rollback|khôi phục|quay lại|trạng thái trước)"
      - id: "LLM-3.03"
        name: "Kiểm tra mã thoát trạng thái (Exit Codes)"
        description: "Hệ thống tự động hóa dựa vào exit code của script kiểm định (exit 0 là pass, exit 1 là fail) để điều hướng luồng."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(exit code|mã thoát|exit 0|exit 1)"
      - id: "LLM-3.04"
        name: "Bộ phân tích phản hồi động (Feedback Parser)"
        description: "Đọc tệp tin kết quả phản hồi feedback.yaml được sinh ra tự động để định hướng chỉnh sửa chi tiết."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(feedback.yaml|đọc feedback|phản hồi)"
      - id: "LLM-3.05"
        name: "Sửa đổi gia tăng khoanh vùng (Incremental Edits)"
        description: "Chỉ thị nghiêm cấm việc viết lại các phân vùng code/nội dung đã pass trước đó; bảo vệ mã nguồn cũ."
        severity: "critical"
        check_type: "regex_match"
        pattern: "(gia tăng|incremental|khoanh vùng|bảo vệ phần đã pass|không viết lại toàn bộ)"
      - id: "LLM-3.06"
        name: "Cấm tuyệt đối Placeholder trong kết quả"
        description: "Tuyệt đối cấm mô hình viết các dòng code tắt kiểu '...' hoặc '// TODO: implement here' trong sản phẩm hoàn thiện."
        severity: "critical"
        check_type: "keyword_block"
        blocked_keywords: ["// TODO: implement here", "# Implement here", "... #", " ... "]
      - id: "LLM-3.07"
        name: "Định nghĩa Báo cáo chất lượng cụ thể"
        description: "Sau khi kết thúc vòng lặp thành công, bắt buộc xuất báo cáo đánh giá chất lượng chi tiết theo mẫu."
        severity: "major"
        check_type: "regex_match"
        pattern: "(báo cáo chất lượng|evaluation report|evaluation-report.md)"
      - id: "LLM-3.08"
        name: "Ràng buộc kiểm tra Schema dữ liệu"
        description: "Có bước kiểm định định dạng YAML/JSON đầu ra bằng schema chuẩn trước khi chuyển sang bước tiếp theo."
        severity: "major"
        check_type: "regex_match"
        pattern: "(schema|kiểm định cấu trúc|chính xác cấu trúc)"
      - id: "LLM-3.09"
        name: "Đánh dấu phiên bản Skill chuẩn"
        description: "Mỗi skill định nghĩa phải đi kèm tag phiên bản chuẩn Semantic Versioning ở đầu metadata."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(version:|major.minor.patch)"
      - id: "LLM-3.10"
        name: "Độ trễ phản hồi an toàn"
        description: "Giới hạn thời gian chạy của script loop_refiner tối đa 60 giây, tránh bị treo vô tận."
        severity: "minor"
        check_type: "regex_match"
        pattern: "(thời gian chạy|timeout|timeout_seconds)"

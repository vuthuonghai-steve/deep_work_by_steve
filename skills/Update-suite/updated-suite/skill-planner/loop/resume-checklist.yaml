# Resume Checklist: Skill Planner Resumption Protocol (YAML)
# Dùng khi resuming từ checkpoint trong planning process

version: "1.0.0"
artifact_type: "resume-checklist"

resumption_protocol:
  check_stale:
    description: "Kiểm tra checkpoint có stale (> 7 days) không"
    rule: "Nếu stale > 7 days → warn user, require explicit confirmation"

  position_detection:
    description: "Xác định vị trí hiện tại trong workflow"
    phases:
      - phase: 0
        name: "Fresh Start"
        action: "Proceed to Step READ"
      - phase: "1-3"
        name: "Resume Available"
        action: "Ask user: resume or restart?"
      - phase: 4
        name: "Complete"
        action: "Report: Todo.md already exists, use skill-builder"

  resume_steps:
    - id: "R1"
      description: "Xác định phase hiện tại từ checkpoint"
      check: "todo.md status field hoặc last modified"
    - id: "R2"
      description: "Load checkpoint context nếu có"
      check: ".skill-context/{skill-name}/.checkpoint.json"
    - id: "R3"
      description: "Verify design.md vẫn tồn tại và unchanged"
      check: "Hash comparison hoặc modification date"
    - id: "R4"
      description: "Load resources/ đã được audit chưa"
      check: "Pre-requisites table đã có Status chưa"
    - id: "R5"
      description: "Xác định tasks đã complete vs pending"
      check: "Phase breakdown với task status"

  checkpoint_data:
    description: "Data cần сохранять при checkpoint"
    fields:
      - "current_phase"
      - "last_completed_step"
      - "audit_results"
      - "prerequisites_status"
      - "pending_clarifications"
      - "timestamp"

validation:
  before_resume:
    - "Verify design.md unchanged since checkpoint"
    - "Check for newer resources/ files"
    - "Confirm user intent: resume or restart"
  after_resume:
    - "Reload relevant knowledge files"
    - "Continue from last incomplete step"
    - "Update todo.md status accordingly"

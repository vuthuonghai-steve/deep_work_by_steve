# Analysis Rules Configuration
# Defines patterns and thresholds for hook analysis

version: "1.0"
last_updated: "2026-03-04"

# Confidence thresholds
confidence:
  min_threshold: 70  # Only report issues above this threshold
  critical_boost: 5  # Boost for Critical severity
  high_boost: 3      # Boost for High severity

# Severity mapping
severity:
  Critical:
    score: 4
    action: "Must fix before deployment"
  High:
    score: 3
    action: "Should fix in current sprint"
  Medium:
    score: 2
    action: "Consider fixing"
  Low:
    score: 1
    action: "Nice to have"

# Security rules (from shell-security-standards.md)
security_rules:
  command_injection:
    - id: "SEC-CMD-001"
      name: "Unquoted variable in command substitution"
      pattern: '\$\([^)]*\$[^)]+\)'
      severity: "Critical"

    - id: "SEC-CMD-002"
      name: "eval with dynamic input"
      pattern: '\beval\s+["\$\(]'
      severity: "Critical"

    - id: "SEC-CMD-003"
      name: "Pipe to shell interpreter"
      pattern: '\|\s*(bash|sh|zsh)\s*($|\s)'
      severity: "Critical"

    - id: "SEC-CMD-004"
      name: "Unquoted variable expansion"
      pattern: '[^"]\$\w+[^"]'
      severity: "High"

  path_traversal:
    - id: "SEC-PATH-001"
      name: "Path traversal in file operation"
      pattern: '(cat|cp|rm|ls|cd)\s+["$][^"]+/\.\./'
      severity: "High"

  privilege_escalation:
    - id: "SEC-PRIV-001"
      name: "Insecure temp file pattern"
      pattern: 'mktemp\s+(?!")'
      severity: "High"

  input_validation:
    - id: "SEC-INPUT-001"
      name: "Unvalidated input in I/O"
      pattern: '\$\{?\w+\}?\s*(>|>>|<)'
      severity: "High"

  environment:
    - id: "SEC-ENV-001"
      name: "Relative command path"
      pattern: '^ls\s|^cat\s|^grep\s'
      severity: "High"

# Bash best practice rules (from shell-best-practices.md)
bash_rules:
  exit_codes:
    - id: "BASH-EXIT-001"
      name: "Missing set -euo pipefail"
      pattern: '^#!/.*bash.*$'
      expected: "set -euo pipefail"
      severity: "Critical"

    - id: "BASH-EXIT-002"
      name: "Suspicious exit code"
      pattern: 'exit\s+0\s*\(.*[fF]ail|exit\s+[^0]'
      severity: "High"

  variables:
    - id: "BASH-VAR-001"
      name: "Non-local variable in function"
      pattern: '^\s+\w+='
      expected: "local"
      severity: "High"

    - id: "BASH-VAR-002"
      name: "Concatenated variables"
      pattern: '\$\{?\w+\}?\s*\$\{?\w+\}?'
      severity: "Medium"

  strings:
    - id: "BASH-STR-001"
      name: "Unquoted variable in echo"
      pattern: 'echo\s+\$[\w{]'
      severity: "Critical"

  anti_patterns:
    - id: "BASH-ANTI-001"
      name: "Parsing ls output"
      pattern: '\$\(ls\s+'
      severity: "Critical"

    - id: "BASH-ANTI-002"
      name: "sed with variable"
      pattern: '\|sed\s+.*\$\w'
      severity: "Medium"

  signal_handling:
    - id: "BASH-SIGNAL-001"
      name: "Missing cleanup trap"
      pattern: 'trap\s+.*EXIT'
      expected: "cleanup"
      severity: "Medium"

# Performance rules
performance_rules:
  - id: "PERF-001"
    name: "Subshell in loop"
    pattern: 'for\s+\w+\s+in\s+\$\([^)]+\)'
    severity: "Medium"

  - id: "PERF-002"
    name: "Pipeline in command substitution"
    pattern: '\$\([^)]+\)\s*\|\s*while'
    severity: "Low"

# Edge case checklist
edge_cases:
  - name: "Empty input handling"
    description: "Check if script handles empty stdin/arguments gracefully"

  - name: "Special characters in paths"
    description: "Check for proper quoting with spaces, newlines, glob characters"

  - name: "Signal interruption"
    description: "Check for trap handlers for SIGINT/SIGTERM"

  - name: "Permission errors"
    description: "Check for proper error handling on file/directory access"

  - name: "Missing dependencies"
    description: "Check if required commands are available before use"

  - name: "Timeout handling"
    description: "Check if long-running operations have timeout"

# Report configuration
report:
  include_health_score: true
  include_summary: true
  group_by_severity: true
  max_findings_per_file: 50
  highlight_critical_first: true

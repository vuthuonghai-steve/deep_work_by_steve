# Field Mappings Configuration

> Field name mappings for normalizing input documents to standard format

---

## Functional Requirement Mappings

| Standard Field | Aliases | Description |
|---------------|---------|-------------|
| id | FR_ID, fr_id, requirement_id, req_id | Unique identifier |
| title | name, requirement_name, title, subject | FR title |
| description | content, detail, details, requirement_detail, body | Full description |
| priority | importance, level, prio, severity | Priority level |
| module | component, feature_area, module_name | Related module |
| source | origin, reference, source_file | Source reference |
| dependencies | related, requires, depends_on | Related FRs |
| tags | labels, categories, keywords | Categorization |


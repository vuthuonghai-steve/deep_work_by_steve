## Document Type Detection Patterns

### File Name Patterns

```yaml
functional_requirement:
  - "*fr*"
  - "*functional*requirement*"
  - "*requirement*"

user_story:
  - "*us-*"
  - "*user-story*"
  - "*user_story*"
  - "*story*"

use_case:
  - "*uc-*"
  - "*use-case*"
  - "*use_case*"
  - "*uc*"
```

### Content Start Patterns

```yaml
functional_requirement:
  - "^FR[0-9]"
  - "^Requirement[:\s]"
  - "^FR-"

user_story:
  - "^US[0-9]"
  - "^User Story[:\s]"
  - "^As a,"
  - "^US-"

use_case:
  - "^UC[0-9]"
  - "^Use Case[:\s]"
  - "^UC-"
```

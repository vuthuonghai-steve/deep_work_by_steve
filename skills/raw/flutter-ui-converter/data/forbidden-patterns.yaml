# Forbidden Patterns

# Patterns that MUST NOT appear in converted code.
# Agent checks against these during validation.

business_logic_patterns:
  - pattern: "class \\w+Repository"
    severity: critical
    message: "Repository class modification detected - violates G1"
    guardrail: G1

  - pattern: "class \\w+Service"
    severity: critical
    message: "Service class modification detected - violates G1"
    guardrail: G1

  - pattern: "class \\w+Bloc extends"
    severity: critical
    message: "Bloc class modification detected - violates G1"
    guardrail: G1

  - pattern: "class \\w+Cubit extends"
    severity: critical
    message: "Cubit class modification detected - violates G1"
    guardrail: G1

  - pattern: "class \\w+Event"
    severity: critical
    message: "Event class modification detected - violates G1"
    guardrail: G1

  - pattern: "class \\w+State extends"
    severity: critical
    message: "State class modification detected - violates G1"
    guardrail: G1

dependency_patterns:
  - pattern: "lucide_icons:"
    location: pubspec.yaml
    severity: high
    message: "New icon package added - violates G2"
    guardrail: G2
    suggestion: "Use Material Icons instead"

  - pattern: "feather_icons:"
    location: pubspec.yaml
    severity: high
    message: "New icon package added - violates G2"
    guardrail: G2
    suggestion: "Use Material Icons instead"

  - pattern: "get:"
    location: pubspec.yaml
    severity: high
    message: "GetX added - project uses Bloc"
    guardrail: G2

hardcoded_values:
  # NOTE: G5 is CONDITIONAL - only enforce if target project has i18n system
  # Agent must check for S.of(context), AppLocalizations, or .arb files first
  - pattern: 'Text\\("[^"]{3,}"\\)'
    severity: medium
    message: "Hardcoded text without i18n - violates G5 (only if target has i18n system)"
    guardrail: G5
    exception: "Allow if followed by // TODO: i18n OR if target project has no i18n system"
    conditional: true

  - pattern: "Color\\(0x[0-9A-Fa-f]{8}\\)"
    severity: low
    message: "Hardcoded color - should use theme"
    guardrail: G7
    suggestion: "Use Theme.of(context).colorScheme.*"

  - pattern: "assets/images/.*redo-AI"
    severity: high
    message: "Source project asset path leaked - violates G4"
    guardrail: G4

memory_leak_patterns:
  - pattern: "AnimationController\\("
    requires: ".dispose()"
    severity: high
    message: "AnimationController without dispose() - violates G8"
    guardrail: G8

  - pattern: "TextEditingController\\("
    requires: ".dispose()"
    severity: high
    message: "TextEditingController without dispose() - violates G8"
    guardrail: G8

  - pattern: "FocusNode\\("
    requires: ".dispose()"
    severity: high
    message: "FocusNode without dispose() - violates G8"
    guardrail: G8

  - pattern: "ScrollController\\("
    requires: ".dispose()"
    severity: high
    message: "ScrollController without dispose() - violates G8"
    guardrail: G8

navigation_patterns:
  - pattern: "Navigator\.pushNamed\(|Navigator\.push\(|Navigator\.pop\("
    severity: low
    message: "Navigation pattern detected - ensure it matches target project's existing navigation system"
    guardrail: G9
    suggestion: "Verify target uses same navigation pattern (Navigator.pushNamed vs context.push vs AutoRouter)"

anti_patterns:
  - pattern: "setState\\(\\(\\) \\{[^}]*async"
    severity: medium
    message: "async operation in setState - use FutureBuilder or Bloc"

  - pattern: "BuildContext.*\\.read<.*>\\(\\).*\\.add\\("
    location: "outside onPressed/onTap"
    severity: low
    message: "Event trigger outside callback - may cause rebuild issues"


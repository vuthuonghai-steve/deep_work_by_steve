# Known Issues Database

# This file tracks known issues encountered during UI conversions
# and their mitigations.

issues:
  - id: ISSUE-001
    category: dependency_conflict
    description: Source uses lucide_icons package not in Target
    severity: medium
    mitigation: Map to Material Icons equivalents (Icons.*)
    affected_widgets:
      - Icon widgets
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-002
    category: state_management
    description: BlocBuilder context lost after widget restructuring
    severity: high
    mitigation: Ensure BlocBuilder remains within BlocProvider scope
    affected_widgets:
      - BlocBuilder
      - BlocConsumer
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-003
    category: asset_path
    description: Asset paths differ between Source and Target
    severity: medium
    mitigation: Use asset-checklist.md to map paths correctly
    affected_widgets:
      - Image.asset
      - AssetImage
      - SvgPicture.asset
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-004
    category: localization
    description: Hardcoded text strings from prototype
    severity: medium
    mitigation: Replace with S.of(context).key or add TODO comment
    affected_widgets:
      - Text
      - TextField (hintText, labelText)
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-005
    category: responsive_layout
    description: Fixed dimensions cause RenderFlex overflow
    severity: low
    mitigation: Use Expanded/Flexible, avoid hardcoded height/width
    affected_widgets:
      - Container
      - SizedBox
      - Column/Row children
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-006
    category: sdk_compatibility
    description: Source uses Color.withValues() not available in Target SDK
    severity: medium
    mitigation: Replace with Color.withOpacity() or .withAlpha()
    affected_widgets:
      - Color usage
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-007
    category: theme
    description: Hardcoded Color(0xFFxxxxxx) instead of theme constants
    severity: low
    mitigation: Use Theme.of(context).colorScheme.* or AppColors.*
    affected_widgets:
      - All widgets with color properties
    first_seen: 2026-04-26
    occurrences: 0

  - id: ISSUE-008
    category: business_logic
    description: Accidentally modified Bloc event or state class
    severity: critical
    mitigation: Revert changes, only modify UI layer
    affected_widgets:
      - Bloc/Cubit classes
    first_seen: 2026-04-26
    occurrences: 0

last_updated: 2026-04-26T07:22:00Z

# Project Configuration

# Stores project paths and settings to avoid re-asking user.
# Agent reads this at startup and updates when user provides new paths.

projects:
  source:
    name: tranphueco-redo-AI
    path: "../tranphueco-redo-AI" # Relative to target root if adjacent
    description: Reference project with new UI/UX
    last_used: null

  target:
    name: tranphueco
    path: "." # Current workspace root
    design_doc_path: "./DESIGN.md"
    description: Production project with business logic
    last_used: null

preferences:
  auto_backup: true
  backup_before_conversion: true
  validate_before_commit: true
  show_detailed_logs: false

conversion_history:
  # Agent appends conversion sessions here
  sessions: []

usage_instructions:
  - "Agent reads this file at Phase 1 startup"
  - "If paths are empty, Agent asks user once and saves here"
  - "User can manually edit paths if projects move"
  - "sessions[] tracks conversion history for analytics"

last_updated: null

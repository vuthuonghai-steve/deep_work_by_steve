# Theme Mapping Rules - POPULATED (Ground Truth Scan 2026-04-26)
# Screen: Gian hàng (Store)
# Source: tranphueco-redo-AI | Target: tranphueco
#
# KEY FINDING: Both projects share IDENTICAL AppColors values for new design tokens.
# Source uses abstract class (app_colors.dart), Target uses concrete class (theme_color.dart)
# but values are 1:1 identical → direct substitution safe.

color_mapping_strategy:
  primary_colors:
    - source_ref: "AppColors.background (source)"
      source_hex: "0xFF0A0B14"
      target_constant: "AppColors.background"
      target_import: "package:tranphu/presentation/themes/theme_color.dart"
      notes: Dark background - identical in both projects

    - source_ref: "AppColors.card (source)"
      source_hex: "0xFF161828"
      target_constant: "AppColors.card"
      target_import: "package:tranphu/presentation/themes/theme_color.dart"
      notes: Card surface color - identical

    - source_ref: "AppColors.mutedForeground (source)"
      source_hex: "0xFF9CA3AF"
      target_constant: "AppColors.mutedForeground"
      target_import: "package:tranphu/presentation/themes/theme_color.dart"
      notes: Muted/secondary text - identical

    - source_ref: "AppColors.brandGold (source)"
      source_hex: "0xFFE8CC6A"
      target_constant: "AppColors.brandGold"
      target_import: "package:tranphu/presentation/themes/theme_color.dart"
      notes: Gold accent (user points display) - identical

    - source_ref: "AppColors.brandRed (source)"
      source_hex: "0xFFD22A2D"
      target_constant: "AppColors.brandRed"
      target_import: "package:tranphu/presentation/themes/theme_color.dart"
      notes: Brand red (points badge in RewardCard) - identical

  semantic_colors:
    - source_ref: "Colors.white"
      target_constant: "AppColors.white"
      target_import: "package:tranphu/presentation/themes/theme_color.dart"
      notes: Use AppColors.white instead of Colors.white for consistency

    - source_ref: "Colors.white30 / Colors.white.withValues(alpha:0.3)"
      target_constant: "AppColors.white.withValues(alpha: 0.3)"
      notes: Semi-transparent white for hint text / icon

text_style_mapping:
  headings:
    - source_pattern: "fontSize: 16, fontWeight: w900, color: Colors.white, letterSpacing: 0.5"
      source_usage: "Shop title 'GIAN HANG DOI DIEM'"
      target_constant: "AppTextTheme.medium.copyWith(fontSize: 16, fontWeight: FontWeight.w900, letterSpacing: 0.5)"
      target_import: "package:tranphu/presentation/themes/theme_text.dart"
      notes: "No exact match - use medium (white, 15px) + copyWith for size/weight override"

  body_text:
    - source_pattern: "fontSize: 14, fontWeight: w900, color: AppColors.brandGold"
      source_usage: "User points number"
      target_constant: "AppTextTheme.normalWhite.copyWith(fontSize: 14, fontWeight: FontWeight.w900, color: AppColors.brandGold)"
      notes: Points number displayed in gold

    - source_pattern: "fontSize: 13, fontWeight: w800, color: Colors.white"
      source_usage: "RewardCard product name"
      target_constant: "AppTextTheme.normalWhite.copyWith(fontSize: 13, fontWeight: FontWeight.w800)"
      notes: Product name in reward card

  labels:
    - source_pattern: "fontSize: 10, color: AppColors.mutedForeground, fontWeight: bold"
      source_usage: "'Diem' label in header"
      target_constant: "AppTextTheme.style10pxGrey.copyWith(fontWeight: FontWeight.bold, color: AppColors.mutedForeground)"
      notes: Small muted label above points number

    - source_pattern: "fontSize: 11, fontWeight: w600, color: AppColors.mutedForeground"
      source_usage: "Stock label 'Con X'"
      target_constant: "AppTextTheme.style12pxGrey.copyWith(fontSize: 11, fontWeight: FontWeight.w600, color: AppColors.mutedForeground)"
      notes: Stock count in reward card

    - source_pattern: "fontSize: 11, fontWeight: w900, color: Colors.white"
      source_usage: "Points badge text"
      target_constant: "AppTextTheme.regular.copyWith(fontSize: 11, fontWeight: FontWeight.w900)"
      notes: Points badge pill in RewardCard

spacing_constants:
  # NO AppSpacing class found in target project.
  # NO AppRadius class found in target project.
  # Use raw EdgeInsets/BorderRadius values directly (same as source).
  padding:
    - source_value: "EdgeInsets.fromLTRB(16, 12, 16, 20)"
      fallback: "EdgeInsets.fromLTRB(16, 12, 16, 20)"
      notes: Shop header padding

    - source_value: "EdgeInsets.symmetric(horizontal: 16)"
      fallback: "EdgeInsets.symmetric(horizontal: 16)"
      notes: Search bar horizontal padding

border_radius:
  - source_value: "BorderRadius.circular(24)"
    fallback: "BorderRadius.circular(24)"
    notes: RewardCard outer radius

  - source_value: "BorderRadius.vertical(top: Radius.circular(24))"
    fallback: "BorderRadius.vertical(top: Radius.circular(24))"
    notes: RewardCard image top radius

  - source_value: "BorderRadius.circular(16)"
    fallback: "BorderRadius.circular(16)"
    notes: Search bar border radius

  - source_value: "BorderRadius.circular(99)"
    fallback: "BorderRadius.circular(99)"
    notes: Points badge pill radius


# Widget Equivalents Mapping

# Maps Source project widgets to Target project equivalents.
# Used by Agent during Phase 1 analysis to identify substitutions.

icon_packages:
  lucide_icons:
    package_name: lucide_icons
    target_equivalent: material_icons
    mappings:
      - source: LucideIcons.home
        target: Icons.home_outlined
      - source: LucideIcons.user
        target: Icons.person_outline
      - source: LucideIcons.settings
        target: Icons.settings_outlined
      - source: LucideIcons.search
        target: Icons.search
      - source: LucideIcons.heart
        target: Icons.favorite_border
      - source: LucideIcons.star
        target: Icons.star_border
      - source: LucideIcons.bell
        target: Icons.notifications_outlined
      - source: LucideIcons.mail
        target: Icons.email_outlined
      - source: LucideIcons.calendar
        target: Icons.calendar_today
      - source: LucideIcons.clock
        target: Icons.access_time

  feather_icons:
    package_name: feather_icons
    target_equivalent: material_icons
    mappings:
      - source: FeatherIcons.home
        target: Icons.home_outlined
      - source: FeatherIcons.user
        target: Icons.person_outline
      - source: FeatherIcons.settings
        target: Icons.settings_outlined

ui_components:
  buttons:
    - source_pattern: CustomButton
      target_equivalent: ElevatedButton
      notes: Use existing Material button with custom styling

    - source_pattern: GradientButton
      target_equivalent: ElevatedButton with gradient decoration
      notes: Wrap ElevatedButton in Container with gradient

  cards:
    - source_pattern: CustomCard
      target_equivalent: Card
      notes: Use Material Card with elevation and shape

color_api:
  - source: Color.withValues(alpha: x)
    target: Color.withOpacity(x)
    flutter_version: "< 3.27"
    notes: withValues() only available in Flutter 3.27+

  - source: Color.withValues(red: r, green: g, blue: b)
    target: Color.fromRGBO(r, g, b, 1.0)
    flutter_version: "< 3.27"

text_theme:
  material3_to_material2:
    - source: textTheme.bodyLarge
      target: textTheme.bodyText1
      condition: Material 2 project

    - source: textTheme.bodyMedium
      target: textTheme.bodyText2
      condition: Material 2 project

    - source: textTheme.titleLarge
      target: textTheme.headline6
      condition: Material 2 project


# Tag Reference — Claude Code Prompt Tags

> Danh sách tags được phép dùng cho Claude Code prompts
> Nguồn: Tổng hợp từ 7 tool reference (Anthropic, Windsurf, Replit, Lovable, Perplexity, Gemini, Warp.dev)
> Usage: Chỉ dùng tags có trong danh sách này. Không tự phát minh tag mới.

tags:
  - name: goal
    description: Mục tiêu chính — 1-3 dòng, rõ ràng
    example: |
      <goal>
        Tạo component LoginForm với validation
      </goal>
    priority: 5
    when_to_use: Bắt buộc cho MỌI prompt. Đặt đầu tiên.

  - name: context
    description: Thông tin môi trường, codebase, user context
    example: |
      <context>
        <environment>
          Working directory: ${WORKING_DIR}
          OS: ${OS}
          Git status: ${GIT_STATUS}
        </environment>
        <user_info>
          [Relevant user context]
        </user_info>
        <codebase_state>
          [Current file state if relevant]
        </codebase_state>
      </context>
    priority: 4
    when_to_use: Khi prompt cần context về môi trường hoặc codebase

  - name: constraints
    description: Rules, giới hạn, NEVER/IMPORTANT/PREFER
    example: |
      <constraints>
        <must_do>
          - [Required action 1]
          - [Required action 2]
        </must_do>
        <never_do>
          - NEVER [prohibited action]
        </never_do>
        <prefer>
          - DO [recommended approach]
          - AVOID [anti-pattern]
        </prefer>
      </constraints>
    priority: 4
    when_to_use: Khi prompt có rules hoặc giới hạn cụ thể

  - name: output_format
    description: Format output mong đợi
    example: |
      <output_format>
        <changes>
          <change>
            <file>[path]</file>
            <description>[brief change summary]</description>
          </change>
        </changes>
        <verification>
          [How to verify the change]
        </verification>
      </output_format>
    priority: 3
    when_to_use: Khi user cần format cụ thể cho output

  - name: identity
    description: Persona, ngôn ngữ, vai trò AI
    example: |
      <identity>
        You are [ROLE], an AI assistant specialized in [DOMAIN].
        Today is ${CURRENT_DATE}.
      </identity>
    priority: 3
    when_to_use: Khi cần định nghĩa persona hoặc ngôn ngữ

  - name: examples
    description: Ví dụ minh họa cho expected behavior
    example: |
      <examples>
        <example>
          Input: [example input]
          Output: [expected output]
        </example>
      </examples>
    priority: 2
    when_to_use: Khi cần minh họa rõ expectation

  - name: workflow
    description: Các bước thực hiện (nếu phức tạp)
    example: |
      <workflow>
        1. [Step 1]
        2. [Step 2]
        3. [Step 3 - verify]
      </workflow>
    priority: 2
    when_to_use: Khi task có nhiều bước cần thực hiện tuần tự

  # Dynamic context variables
  - name: ${VAR}
    description: Dynamic context interpolation syntax
    example: |
      ${CURRENT_DATE}    — Ngày hiện tại
      ${WORKING_DIR}      — Thư mục làm việc
      ${GIT_STATUS}       — Trạng thái git
      ${OS}               — Hệ điều hành
      ${USER_LANGUAGE}    — Ngôn ngữ user (vi/en)
      ${Current branch}   — Git branch hiện tại
      ${Last 5 Recent commits} — Git history
    priority: 5
    when_to_use: "Luôn dùng ${VAR} cho dynamic context, không hardcode"

  # Block-level tags
  - name: must_do
    description: Actions bắt buộc phải làm
    example: |
      <must_do>
        - Validate input
        - Write tests
      </must_do>
    priority: 4
    when_to_use: Bên trong <constraints>

  - name: never_do
    description: Actions bị cấm tuyệt đối
    example: |
      <never_do>
        - NEVER commit secrets
        - NEVER modify production directly
      </never_do>
    priority: 5
    when_to_use: Bên trong <constraints> — NEVER rules

  - name: prefer
    description: Recommended approaches
    example: |
      <prefer>
        - DO [recommended approach]
        - AVOID [anti-pattern]
      </prefer>
    priority: 2
    when_to_use: Bên trong <constraints>

  # CDATA wrapper (Gemini style)
  - name: content
    description: CDATA wrapper cho file content
    example: |
      <content><![CDATA[
        Full content here
        (No escaping needed inside CDATA)
      ]]></content>
    priority: 4
    when_to_use: Khi truyền file content trong output_format

# NEVER Rules Keywords
never_keywords:
  - NEVER: "Cấm tuyệt đối, không làm gì"
  - IMPORTANT: "Quan trọng, phải tuân thủ"
  - CARDINAL RULE: "Luật cốt lõi, không thể vi phạm"
  - AVOID: "Nên tránh"
  - CRITICAL: "Cảnh báo nghiêm trọng"
  - PREFER: "Ưu tiên"

# Anti-patterns
anti_patterns:
  - prompt_dai_khong_cau_truc: "Prompt dài không cấu trúc"
  - khong_co_goal: "Không có <goal>"
  - hardcode_path: "Hardcode path thay vì ${VAR}"
  - khong_co_constraints: "Không có constraints"
  - khong_co_output_format: "Không có output format"

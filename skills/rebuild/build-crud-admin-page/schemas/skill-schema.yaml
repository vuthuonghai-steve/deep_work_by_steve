$schema: "https://json-schema.org/draft-07/schema#"
title: "build-crud-admin-page SKILL.md schema"
type: object
required:
  - name
  - description
  - category
  - version
properties:
  name:
    type: string
    pattern: "^[a-z0-9-]+$"
    maxLength: 64
  description:
    type: string
    maxLength: 1024
  category:
    type: string
    enum: [admin, api, ui, data, meta]
  version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  author:
    type: string
    default: "Steve Void Team"
  triggers:
    type: array
    items:
      type: string
  workflow:
    type: object
    properties:
      phases:
        type: array
        items:
          type: object
          required: [name, steps]
          properties:
            name:
              type: string
            steps:
              type: array
              items:
                type: string
  guardrails:
    type: object
    properties:
      must:
        type: array
        items:
          type: string
      must_not:
        type: array
        items:
          type: string
  references:
    type: array
    items:
      type: object
      properties:
        file:
          type: string
        purpose:
          type: string

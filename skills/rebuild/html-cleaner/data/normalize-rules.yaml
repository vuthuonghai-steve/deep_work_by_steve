# HTML Cleaner Normalization Rules
# Shared with other text processing skills

encoding:
  target: UTF-8
  fallback: replace-unsafe-chars

line_endings:
  style: unix
  max_consecutive: 2

whitespace:
  collapse: true
  trim_lines: true
  code_block_indent: preserve

structure:
  heading_style: atx
  list_style: hyphen
  code_fence: triple_backtick

sanitization:
  tags_removed:
    - script
    - style
    - iframe
    - object
    - embed
    - form
    - input
    - button
  attributes_removed:
    - onclick
    - onerror
    - onload
    - style
    - class
    - id
  protocols_blocked:
    - javascript:
    - vbscript:
    - data:

markers:
  table_ambiguous: "[TABLE_AMBIGUOUS]"
  warnings: "[WARNINGS: {list}]"

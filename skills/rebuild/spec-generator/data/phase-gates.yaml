# Phase Gates — Validation Requirements Per Phase

> Each phase requires specific validation before proceeding to the next

---

## Phase 0 → Phase 1 Gate

**Name**: Ambiguity Detection Gate

**Required Checks**:
1. Ambiguity score calculated
2. Score is LOW (0-2) OR user confirmed sufficient context

**Gate Output**:
```yaml
gate:
  from: phase_0
  to: phase_1
  status: PASS|FAIL
  ambiguity_score: <0-6>
  questions_generated: <count>
  user_confirmed: true|false
```

**If FAIL**: Return clarifying questions from `templates/clarity-questions.yaml`

---

## Phase 1 → Phase 2 Gate

**Name**: Schema Validation Gate

**Required Checks**:
1. api.json passes JSON Schema validation (`templates/api-json.schema.yaml`)
2. All required fields present: `spec_version`, `feature`, `engine`, `entities`, `endpoints`
3. `spec_version` equals "2.0.0"
4. All entities have at least one endpoint
5. All endpoints have `trace` field starting with "P1-"
6. Auth configuration present

**Gate Output**:
```yaml
gate:
  from: phase_1
  to: phase_2
  status: PASS|FAIL
  schema_validated: true|false
  entity_count: <number>
  endpoint_count: <number>
  errors: []
```

**If FAIL**: Return schema validation errors

---

## Phase 2 → Phase 3 Gate

**Name**: Cross-Reference Gate

**Required Checks** (Category A rules):
1. A1: Entity name match — api.json ↔ business.md
2. A2: Collection slug match — api.json ↔ business.md
3. A3: Field presence — every field in business.md exists in api.json
4. A4: Field type match — types consistent
5. A5: Endpoint ↔ Permissions — auth aligned
6. A6: Status ↔ Actions — transitions map to endpoints
7. A7: Actor ↔ Auth — every actor has auth config

**Gate Output**:
```yaml
gate:
  from: phase_2
  to: phase_3
  status: PASS|FAIL
  rules_passed: <0-7>
  rules_failed: []
  cross_ref_errors: []
```

**If FAIL**: Return Category A rule failures

---

## Phase 3 → Phase 4 Gate

**Name**: Diagram Consistency Gate

**Required Checks** (Category B rules):
1. B1: Actor naming — flow.md participants match business.md actors
2. B2: Status transitions — state diagrams match Status Workflow
3. B3: Sequence steps — reflect Business Rules
4. B4: Entity reference — data flow matches Entity Definitions
5. B5: Edge case coverage — error flows cover Edge Cases

**Complexity Adaptation**:
- LOW: Skip B4-B5 (minimal diagrams)
- MEDIUM: All B rules apply
- HIGH: All B rules + additional sub-flow validation

**Gate Output**:
```yaml
gate:
  from: phase_3
  to: phase_4
  status: PASS|FAIL
  complexity: LOW|MEDIUM|HIGH
  rules_passed: <0-5>
  rules_failed: []
  diagram_count: <number>
```

**If FAIL**: Return Category B rule failures

---

## Phase 4 → Phase 5 Gate

**Name**: Trace Coverage Gate

**Required Checks** (Category C rules):
1. C1: Phase coverage — every flow.md section has tasks
2. C2: Actor assignment — flow.md actors assigned in tasks
3. C3: Trace field presence — 100% of tasks have trace
4. C4: Artifact section ref — trace references valid artifact

**Additional Checks**:
- Complexity matches `data/complexity-matrix.yaml` criteria
- Phase structure matches complexity (LOW skips Phase 3)
- All task dependencies resolved (no circular dependencies)

**Gate Output**:
```yaml
gate:
  from: phase_4
  to: phase_5
  status: PASS|FAIL
  trace_coverage: <percentage>
  tasks_total: <number>
  tasks_traced: <number>
  complexity_confirmed: LOW|MEDIUM|HIGH
  errors: []
```

**If FAIL**: Return Category C rule failures with specific tasks

---

## Phase 5 → Handoff Gate

**Name**: Completeness Gate

**Required Checks** (Category D rules):
1. D1: All 4 artifacts present in spec folder
2. D2: Required sections in all markdown artifacts
3. D3: Schema version = "2.0.0" in all artifacts
4. D4: Trace coverage = 100%
5. D5: Complexity consistent with matrix

**Handoff Requirements**:
- `spec-meta.yaml` created with validation evidence
- `build-log.md` created with all gate results
- Signal: `handoff.ready`

**Gate Output**:
```yaml
gate:
  from: phase_5
  to: handoff
  status: PASS|FAIL
  artifacts_complete: true|false
  validation_gates:
    phase_0: PASS|FAIL
    phase_1: PASS|FAIL
    phase_2: PASS|FAIL
    phase_3: PASS|FAIL
    phase_4: PASS|FAIL
    phase_5: PASS|FAIL
  handoff_signal: handoff.ready
```

**If FAIL**: Block handoff, return D-rule failures

---

## Gate Decision Matrix

| From | To | Gate Type | Blocking If |
|------|----|-----------|-------------|
| Phase 0 | Phase 1 | Ambiguity | Score > 2 AND !user_confirmed |
| Phase 1 | Phase 2 | Schema | Any schema validation error |
| Phase 2 | Phase 3 | Cross-Ref | Any A-rule failure |
| Phase 3 | Phase 4 | Consistency | Any B-rule failure |
| Phase 4 | Phase 5 | Trace | Trace coverage < 100% |
| Phase 5 | Handoff | Completeness | Any D-rule failure |
